<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>石头剪刀布 · 卡牌对战</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0b1a; --bg2: #13132b;
  --card-rock: #9b6b1c; --card-rock-glow: #f0a030;
  --card-paper: #d4c8a8; --card-paper-glow: #ffe9b0;
  --card-scissors: #4a7c9b; --card-scissors-glow: #6ab8e0;
  --accent: #ffd54f; --win: #4caf84; --lose: #e05555; --draw: #d4a844;
  --text: #e8e6f0; --text-dim: #8888a8;
  --radius: 14px; --radius-lg: 20px;
}

html, body {
  height: 100%; overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text);
  -webkit-tap-highlight-color: transparent; user-select: none;
}
body { background: radial-gradient(ellipse at 50% 0%, #1a1a3e 0%, var(--bg) 70%); }

#app { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }

.screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 20px; }
.screen.active { display: flex; }

.btn {
  padding: 14px 40px; border: none; border-radius: 50px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  transition: all 0.25s; letter-spacing: 1px;
}
.btn:active { transform: scale(0.95); }
.btn-primary {
  background: linear-gradient(135deg, #ffd54f, #f0a030); color: #1a1a2e;
  box-shadow: 0 4px 24px rgba(240,160,48,0.35);
}
.btn-primary:hover { box-shadow: 0 6px 32px rgba(240,160,48,0.5); transform: translateY(-2px); }
.btn-secondary {
  background: rgba(255,255,255,0.08); color: var(--text-dim);
  border: 1px solid rgba(255,255,255,0.12); font-size: 14px; padding: 10px 28px;
}
.btn-secondary:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
.btn-play-again {
  padding: 16px 56px; font-size: 18px;
  background: linear-gradient(135deg, #6a5acd, #836fff); color: #fff;
  box-shadow: 0 4px 24px rgba(106,90,205,0.4);
}
.btn-play-again:hover { box-shadow: 0 6px 36px rgba(106,90,205,0.55); transform: translateY(-2px); }

/* 连接界面 */
#menu-screen h1 {
  font-size: 38px; font-weight: 800;
  background: linear-gradient(135deg, #ffd54f, #f0a030, #ff8c00);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 6px; text-align: center; line-height: 1.2;
}
#menu-screen .subtitle { font-size: 15px; color: var(--text-dim); margin-bottom: 36px; letter-spacing: 2px; }
.menu-buttons { display: flex; flex-direction: column; gap: 14px; align-items: center; }
.divider { color: var(--text-dim); font-size: 12px; margin: 4px 0; }

.join-row { display: flex; gap: 8px; align-items: center; }
.join-row input {
  width: 140px; padding: 12px 16px; border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
  color: var(--text); font-size: 15px; text-align: center;
  outline: none; font-family: monospace; letter-spacing: 2px;
}
.join-row input:focus { border-color: var(--accent); }
.join-row input::placeholder { color: var(--text-dim); letter-spacing: 1px; font-family: sans-serif; font-size: 13px; }

.room-code-display {
  background: rgba(255,255,255,0.06); border: 1px dashed rgba(255,200,50,0.3);
  border-radius: 12px; padding: 16px 24px; margin: 16px 0; text-align: center;
}
.room-code-display .label { font-size: 12px; color: var(--text-dim); margin-bottom: 6px; }
.room-code-display .code {
  font-size: 32px; font-weight: 800; font-family: monospace; letter-spacing: 4px;
  color: var(--accent);
}

/* 等待界面 */
#waiting-screen h2 { font-size: 22px; margin-bottom: 32px; font-weight: 600; }
.spinner-dots { display: flex; gap: 10px; margin-bottom: 16px; }
.spinner-dots span {
  width: 12px; height: 12px; border-radius: 50%; background: var(--accent);
  animation: dotBounce 1.4s ease-in-out infinite both;
}
.spinner-dots span:nth-child(2) { animation-delay: 0.16s; }
.spinner-dots span:nth-child(3) { animation-delay: 0.32s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* 游戏 */
.game-topbar {
  width: 100%; padding: 16px 24px; display: flex; align-items: center;
  justify-content: space-between; flex-shrink: 0;
}
.game-title { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
.game-info { display: flex; align-items: center; gap: 16px; }
.round-badge {
  background: rgba(255,255,255,0.06); padding: 6px 16px;
  border-radius: 20px; font-size: 14px; font-weight: 600; color: var(--text-dim);
}
.round-badge b { color: var(--text); }

.timer-circle { position: relative; width: 52px; height: 52px; }
.timer-circle svg { transform: rotate(-90deg); }
.timer-circle .bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 4; }
.timer-circle .progress {
  fill: none; stroke: var(--accent); stroke-width: 4;
  stroke-linecap: round; transition: stroke-dashoffset 1s linear;
}
.timer-circle .progress.urgent { stroke: var(--lose); }
.timer-circle .timer-text {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums;
}
.timer-circle .timer-text.urgent { color: var(--lose); }

.game-arena {
  flex: 1; width: 100%; max-width: 900px;
  display: flex; align-items: center; justify-content: center; gap: 20px; padding: 10px 20px;
}

.player-panel { flex: 1; max-width: 280px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.player-name { font-size: 18px; font-weight: 700; color: var(--text); }
.player-name .you { color: #4ecdc4; }
.player-name .opp { color: #ff6b6b; }

.score-dots { display: flex; gap: 6px; }
.score-dot { width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.1); transition: all 0.3s; }
.score-dot.won { background: var(--win); box-shadow: 0 0 10px rgba(76,175,132,0.5); }

.card-display {
  width: 120px; height: 168px; border-radius: 14px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px; transition: all 0.4s;
}
.card-display.placeholder { background: rgba(255,255,255,0.03); border: 2px dashed rgba(255,255,255,0.1); font-size: 13px; color: var(--text-dim); }
.card-display .card-icon { font-size: 48px; }
.card-display .card-label { font-size: 13px; font-weight: 600; }
.card-display.rock  { background: linear-gradient(145deg, #5a3e14, #3d2a0c); border: 2px solid var(--card-rock-glow); }
.card-display.paper { background: linear-gradient(145deg, #8a8070, #5a5244); border: 2px solid var(--card-paper-glow); }
.card-display.scissors { background: linear-gradient(145deg, #2a4a60, #1a3040); border: 2px solid var(--card-scissors-glow); }
.card-display.timeout { background: rgba(180,40,40,0.2); border: 2px solid var(--lose); }

.card-display.hidden { background: linear-gradient(145deg, #2a2040, #1a1030); border: 2px solid rgba(255,255,255,0.15); }
.card-status { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
.card-status.played { color: var(--accent); }

.vs-zone { display: flex; flex-direction: column; align-items: center; gap: 12px; min-width: 100px; }
.vs-text { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #ffd54f, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.round-result { font-size: 20px; font-weight: 700; padding: 8px 20px; border-radius: 20px; display: none; }
.round-result.show { display: block; animation: resultPop 0.4s ease-out; }
.round-result.win  { color: var(--win);  background: rgba(76,175,132,0.12); }
.round-result.lose { color: var(--lose); background: rgba(224,85,85,0.12); }
.round-result.draw { color: var(--draw); background: rgba(212,168,68,0.12); }
@keyframes resultPop {
  0% { transform: scale(0.3); opacity: 0; }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}

.card-hand {
  width: 100%; padding: 12px 20px 24px;
  display: flex; align-items: center; justify-content: center; gap: 20px; flex-shrink: 0;
}

.play-card {
  width: 110px; height: 150px; border-radius: 16px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 8px; cursor: pointer;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  color: #fff; font-weight: 600; border: 2px solid transparent;
}
.play-card:hover { transform: translateY(-12px); }

.play-card.rock { background: linear-gradient(160deg, #6b4c1e, #3d2a0c); border-color: var(--card-rock-glow); box-shadow: 0 6px 28px rgba(155,107,28,0.3); }
.play-card.rock:hover { box-shadow: 0 10px 40px rgba(240,160,48,0.45); }
.play-card.paper { background: linear-gradient(160deg, #9a9078, #5a5244); border-color: var(--card-paper-glow); box-shadow: 0 6px 28px rgba(200,180,140,0.25); }
.play-card.paper:hover { box-shadow: 0 10px 40px rgba(255,233,176,0.4); }
.play-card.scissors { background: linear-gradient(160deg, #3a5c78, #1a3040); border-color: var(--card-scissors-glow); box-shadow: 0 6px 28px rgba(74,124,155,0.25); }
.play-card.scissors:hover { box-shadow: 0 10px 40px rgba(106,184,224,0.4); }
.play-card .card-icon { font-size: 42px; }
.play-card .card-label { font-size: 14px; letter-spacing: 2px; }

.card-hand.played .play-card { opacity: 0.4; cursor: not-allowed; transform: none; pointer-events: none; }
.card-hand.played .play-card:hover { transform: none; box-shadow: none; }

.play-card.selected { animation: cardSelect 0.5s ease-out forwards; opacity: 1 !important; }
@keyframes cardSelect {
  0% { transform: translateY(0) scale(1); }
  30% { transform: translateY(-20px) scale(1.05); }
  100% { transform: translateY(-10px) scale(1); }
}

#result-toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  padding: 14px 32px; border-radius: 30px; font-size: 18px; font-weight: 700;
  z-index: 100; pointer-events: none; display: none; animation: toastIn 0.4s ease-out;
}
#result-toast.show { display: block; }
#result-toast.win  { background: rgba(76,175,132,0.2); color: var(--win);  border: 1px solid rgba(76,175,132,0.3); }
#result-toast.lose { background: rgba(224,85,85,0.2);  color: var(--lose); border: 1px solid rgba(224,85,85,0.3); }
#result-toast.draw { background: rgba(212,168,68,0.2); color: var(--draw); border: 1px solid rgba(212,168,68,0.3); }
@keyframes toastIn {
  0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  100% { opacity: 1; transform: translateX(-50%) translateY(0); }
}

#match-over-overlay {
  position: fixed; inset: 0; z-index: 200;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(5,5,20,0.92); backdrop-filter: blur(8px);
}
#match-over-overlay.show { display: flex; }
#match-over-overlay .result-icon { font-size: 80px; margin-bottom: 16px; }
#match-over-overlay .result-title { font-size: 32px; font-weight: 800; margin-bottom: 8px; }
#match-over-overlay .result-score { font-size: 18px; color: var(--text-dim); margin-bottom: 36px; }
#match-over-overlay.win .result-title { color: var(--win); }
#match-over-overlay.lose .result-title { color: var(--lose); }

#error-overlay {
  position: fixed; inset: 0; z-index: 300; display: none;
  flex-direction: column; align-items: center; justify-content: center;
  background: rgba(5,5,20,0.95);
}
#error-overlay.show { display: flex; }
#error-overlay .err-title { font-size: 24px; font-weight: 700; color: var(--lose); margin-bottom: 12px; }
#error-overlay .err-msg { font-size: 15px; color: var(--text-dim); margin-bottom: 28px; text-align: center; max-width: 320px; }

.confetti { position: fixed; pointer-events: none; z-index: 300; }
.confetti-piece {
  position: absolute; width: 10px; height: 10px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

@media (max-width: 640px) {
  #menu-screen h1 { font-size: 28px; }
  .game-arena { gap: 8px; padding: 8px; }
  .player-panel { max-width: 120px; }
  .card-display { width: 90px; height: 130px; }
  .card-display .card-icon { font-size: 36px; }
  .play-card { width: 90px; height: 130px; }
  .play-card .card-icon { font-size: 34px; }
  .card-hand { gap: 12px; padding: 10px; }
  .vs-text { font-size: 22px; }
  .player-name { font-size: 14px; }
  .score-dots { gap: 4px; }
  .score-dot { width: 10px; height: 10px; }
  .round-result { font-size: 16px; }
  .game-title { font-size: 13px; }
}
</style>
</head>
<body>

<div id="app">

  <!-- 菜单 -->
  <div id="menu-screen" class="screen active">
    <h1>石头剪刀布</h1>
    <div class="subtitle">P2P 卡 牌 对 战</div>
    <div class="menu-buttons">
      <button class="btn btn-primary" onclick="createRoom()">⚔ 创建房间</button>
      <div class="divider">— 或输入房间号加入 —</div>
      <div class="join-row">
        <input type="text" id="room-input" placeholder="房间号" maxlength="12" autocomplete="off">
        <button class="btn btn-secondary" onclick="joinRoom()">加入</button>
      </div>
    </div>
    <div class="room-code-display" id="room-created" style="display:none">
      <div class="label">你的房间号（发给对手）</div>
      <div class="code" id="room-code-text"></div>
      <button class="btn btn-secondary" onclick="copyRoomCode()" style="margin-top:10px">📋 复制房间号</button>
    </div>
    <div id="menu-status" style="font-size:13px;color:var(--text-dim);margin-top:16px"></div>
  </div>

  <!-- 等待 -->
  <div id="waiting-screen" class="screen">
    <h2 id="waiting-title">等待对手加入...</h2>
    <div class="spinner-dots"><span></span><span></span><span></span></div>
    <div class="room-code-display" id="waiting-room-code" style="display:none">
      <div class="label">房间号</div>
      <div class="code" id="waiting-code-text"></div>
    </div>
    <button class="btn btn-secondary" onclick="cancelWait()">取消</button>
  </div>

  <!-- 游戏 -->
  <div id="game-screen" class="screen">
    <div class="game-topbar">
      <div class="game-title">⚔ 石头剪刀布</div>
      <div class="game-info">
        <div class="round-badge">你 <b id="score-me">0</b> : <b id="score-opp">0</b> 对手</div>
        <div class="timer-circle">
          <svg width="52" height="52" viewBox="0 0 52 52">
            <circle class="bg" cx="26" cy="26" r="22"/>
            <circle class="progress" id="timer-progress" cx="26" cy="26" r="22"
              stroke-dasharray="138.2" stroke-dashoffset="0"/>
          </svg>
          <span class="timer-text" id="timer-text">30</span>
        </div>
      </div>
    </div>

    <div class="game-arena">
      <div class="player-panel">
        <div class="player-name"><span class="you">●</span> 你</div>
        <div class="score-dots" id="my-score-dots"></div>
        <div class="card-display placeholder" id="my-card-display"><span>请出牌</span></div>
        <div class="card-status" id="my-card-status"></div>
      </div>
      <div class="vs-zone">
        <div class="vs-text">VS</div>
        <div class="round-result" id="round-result"></div>
      </div>
      <div class="player-panel">
        <div class="player-name"><span class="opp">●</span> 对手</div>
        <div class="score-dots" id="opp-score-dots"></div>
        <div class="card-display placeholder" id="opp-card-display"><span>等待中</span></div>
        <div class="card-status" id="opp-card-status"></div>
      </div>
    </div>

    <div class="card-hand" id="card-hand">
      <div class="play-card rock" onclick="playCard('rock')">
        <div class="card-icon">🪨</div><div class="card-label">石头</div>
      </div>
      <div class="play-card paper" onclick="playCard('paper')">
        <div class="card-icon">📄</div><div class="card-label">布</div>
      </div>
      <div class="play-card scissors" onclick="playCard('scissors')">
        <div class="card-icon">✂️</div><div class="card-label">剪刀</div>
      </div>
    </div>
  </div>

  <div id="result-toast"></div>

  <div id="match-over-overlay">
    <div class="result-icon" id="final-icon"></div>
    <div class="result-title" id="final-title"></div>
    <div class="result-score" id="final-score"></div>
    <button class="btn btn-play-again" onclick="restartMatch()">🔄 再来一局</button>
  </div>

  <div id="error-overlay">
    <div class="err-title">⚠ 连接失败</div>
    <div class="err-msg" id="error-msg"></div>
    <button class="btn btn-primary" onclick="goMenu()">返回</button>
  </div>
</div>

<script>
// ==================== 常量 ====================
const WIN_SCORE = 5;
const ROUND_TIME = 30;
const CARD_EMOJI = { rock:'🪨', paper:'📄', scissors:'✂️', timeout:'⏰' };
const CARD_NAME = { rock:'石头', paper:'布', scissors:'剪刀', timeout:'超时' };
const RESULT_TEXT = { win:'你赢了!', lose:'你输了', draw:'平局' };
const BEATS = { rock:'scissors', paper:'rock', scissors:'paper' };

// ==================== 状态 ====================
let peer = null;
let conn = null;
let iAmHost = false;
let roomCode = '';
let gameState = 'idle';
let myScore = 0, oppScore = 0;
let myCard = null;
let oppCard = null;
let roundResult = null;
let timerInterval = null;
let timeLeft = ROUND_TIME;
let roundActive = false;

// ==================== DOM ====================
const $ = id => document.getElementById(id);
const menuScreen    = $('menu-screen');
const waitingScreen = $('waiting-screen');
const gameScreen    = $('game-screen');
const matchOverlay  = $('match-over-overlay');
const errorOverlay  = $('error-overlay');
const resultToast   = $('result-toast');
const timerText     = $('timer-text');
const timerProgress = $('timer-progress');
const cardHand      = $('card-hand');
const myCardDisplay = $('my-card-display');
const oppCardDisplay= $('opp-card-display');
const myCardStatus  = $('my-card-status');
const oppCardStatus = $('opp-card-status');
const myScoreDots   = $('my-score-dots');
const oppScoreDots  = $('opp-score-dots');
const roundResultEl = $('round-result');
const scoreMeBadge  = $('score-me');
const scoreOppBadge = $('score-opp');
const playCards     = document.querySelectorAll('.play-card');
const menuStatus    = $('menu-status');

// ==================== P2P ====================
function createRoom() {
  goMenu();
  const code = randomCode();
  roomCode = code;
  iAmHost = true;

  $('room-code-text').textContent = code;
  $('room-created').style.display = 'block';
  menuStatus.textContent = '';

  initPeer(code);
  $('waiting-title').textContent = '等待对手加入...';
  $('waiting-room-code').style.display = 'block';
  $('waiting-code-text').textContent = code;
  showScreen('waiting');
}

function joinRoom() {
  const code = $('room-input').value.trim().toUpperCase();
  if (!code || code.length < 4) {
    menuStatus.textContent = '请输入有效的房间号';
    return;
  }
  goMenu();
  roomCode = code;
  iAmHost = false;
  $('waiting-title').textContent = '正在连接信令服务器...';
  $('waiting-room-code').style.display = 'none';
  showScreen('waiting');
  initPeer(null);

  // 给 PeerJS 时间连接信令服务器，然后尝试连接主机
  setTimeout(() => {
    $('waiting-title').textContent = '正在连接房间 ' + code + '...';
    connectToHost(code);
  }, 1500);
}

function randomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i = 0; i < 6; i++) s += chars[Math.floor(Math.random() * chars.length)];
  return s;
}

function initPeer(id) {
  cleanupPeer();
  const peerId = id ? ('rps-' + id) : undefined;

  menuStatus.textContent = '正在连接服务器...';

  peer = new Peer(peerId, {
    debug: 0,
    host: '0.peerjs.com',
    port: 443,
    secure: true,
    path: '/',
    config: {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
      ]
    }
  });

  peer.on('open', (myId) => {
    console.log('Peer ready:', myId);
    if (iAmHost) {
      menuStatus.textContent = '✅ 房间已创建，等待对手连接...';
    }
  });

  peer.on('connection', (incoming) => {
    if (conn) return;
    conn = incoming;
    setupConnection();
    console.log('Opponent connected');
    menuStatus.textContent = '✅ 对手已连接!';
    startGame();
  });

  peer.on('error', (err) => {
    console.error('Peer error:', err);
    if (err.type === 'unavailable-id') {
      roomCode = randomCode();
      const newId = 'rps-' + roomCode;
      peer.destroy();
      peer = new Peer(newId, {
        debug: 0,
        host: '0.peerjs.com',
        port: 443,
        secure: true,
        path: '/',
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
          ]
        }
      });
      $('room-code-text').textContent = roomCode;
      $('waiting-code-text').textContent = roomCode;
      peer.on('open', () => {
        menuStatus.textContent = '✅ 房间已创建';
      });
      peer.on('connection', handleIncomingConnection);
      peer.on('error', (e) => showError('创建房间失败: ' + e.message));
      return;
    }
    if (err.type === 'network' || err.type === 'server-error') {
      showError('无法连接服务器，请检查网络后刷新重试');
    } else {
      showError('连接错误: ' + (err.message || err.type));
    }
  });

  peer.on('disconnected', () => {
    console.log('Peer disconnected from server, reconnecting...');
    menuStatus.textContent = '连接断开，正在重连...';
    peer.reconnect();
  });
}

function handleIncomingConnection(incoming) {
  if (conn) return;
  conn = incoming;
  setupConnection();
  startGame();
}

function connectToHost(code) {
  const hostId = 'rps-' + code;

  // 确保自己的 Peer 已准备好
  function tryConnect() {
    if (!peer || peer.disconnected) {
      setTimeout(tryConnect, 500);
      return;
    }
    if (peer.destroyed) {
      showError('连接失败，请返回重试');
      return;
    }

    menuStatus.textContent = '正在连接房间 ' + code + '...';
    const c = peer.connect(hostId, { reliable: true });

    let connected = false;
    c.on('open', () => {
      connected = true;
      conn = c;
      setupConnection();
      console.log('Connected to host');
      menuStatus.textContent = '✅ 已连接!';
    });

    c.on('error', (err) => {
      console.error('Connection error:', err);
      if (!connected) showError('连接失败，请确认房间号正确且对手已建好房间');
    });

    // 20 秒超时
    setTimeout(() => {
      if (!connected) showError('连接超时（20秒），请确认:\n1. 房间号输入正确\n2. 对手已点击"创建房间"\n3. 双方网络正常');
    }, 20000);
  }

  // 等 1 秒确保 Peer 初始化完成
  setTimeout(tryConnect, 1000);
}

function setupConnection() {
  conn.on('data', (raw) => {
    try {
      const msg = JSON.parse(raw);
      handleMessage(msg);
    } catch(e) { console.error('Parse error:', e); }
  });

  conn.on('close', () => {
    if (gameState === 'playing' || gameState === 'round_result') {
      showError('对手断开了连接');
    } else {
      goMenu();
      menuStatus.textContent = '对手离开了';
    }
  });

  conn.on('error', (err) => {
    console.error('Conn error:', err);
    showError('连接错误');
  });
}

function send(msg) {
  if (conn && conn.open) {
    conn.send(JSON.stringify(msg));
  }
}

// ==================== 游戏逻辑（主机端） ====================
function startGame() {
  if (!iAmHost) return; // 只有主机控制游戏流程
  gameState = 'playing';
  myScore = 0; oppScore = 0;
  startNewRound(1);
}

function startNewRound(round) {
  roundActive = true;
  myCard = null;
  oppCard = null;
  roundResult = null;
  timeLeft = ROUND_TIME;

  send({ type:'round_start', round, timeLeft:ROUND_TIME, myScore:oppScore, oppScore:myScore });

  // 主机自己也更新
  updateUIForRound(round, ROUND_TIME);
  showScreen('game');
  startTimer();

  // 超时处理
  clearTimeout(window._roundTimeout);
  window._roundTimeout = setTimeout(() => handleTimeout(), ROUND_TIME * 1000);
}

function handleTimeout() {
  if (!roundActive) return;
  let winner = null;
  if (myCard && !oppCard) winner = 'me';
  else if (!myCard && oppCard) winner = 'opp';
  // else both timeout or both played

  if (myCard && oppCard) return; // already resolved
  resolveRound(
    myCard || 'timeout',
    oppCard || 'timeout',
    winner
  );
}

function resolveRound(mc, oc, winner) {
  roundActive = false;
  clearTimeout(window._roundTimeout);
  stopTimer();

  if (mc && oc && mc !== 'timeout' && oc !== 'timeout') {
    if (mc === oc) winner = 'draw';
    else if (BEATS[mc] === oc) winner = 'me';
    else winner = 'opp';
  }

  if (winner === 'me') myScore++;
  else if (winner === 'opp') oppScore++;

  const matchOver = myScore >= WIN_SCORE || oppScore >= WIN_SCORE;

  // 发给对手
  send({
    type:'round_result', myCard:mc, oppCard:oc,
    result: flipResult(winner), myScore:oppScore, oppScore:myScore, matchOver
  });

  // 主机自己显示
  showRoundResult(winner === 'me' ? 'win' : winner === 'opp' ? 'lose' : 'draw');
  displayCards(mc, oc);
  myCardDisplay.className = `card-display ${mc || 'timeout'}`;
  myCardDisplay.innerHTML = `<div class="card-icon">${CARD_EMOJI[mc||'timeout']}</div><div class="card-label">${CARD_NAME[mc||'timeout']}</div>`;
  oppCardDisplay.className = `card-display ${oc || 'timeout'}`;
  oppCardDisplay.innerHTML = `<div class="card-icon">${CARD_EMOJI[oc||'timeout']}</div><div class="card-label">${CARD_NAME[oc||'timeout']}</div>`;
  updateScores();
  updateScoreBadge(myScore, oppScore);

  if (matchOver) {
    setTimeout(() => {
      send({ type:'match_over', winner: myScore > oppScore ? 1 : 0, scores:[myScore, oppScore] });
      showMatchOver(myScore > oppScore);
    }, RESULT_DELAY * 1000);
  } else {
    const nextRound = (myScore + oppScore) + (mc === oc ? 0 : 0) + 1;
    // Use a tracker: count non-draw rounds
    window._completedRounds = (window._completedRounds || 0) + 1;
    setTimeout(() => startNewRound(window._completedRounds + 1), RESULT_DELAY * 1000);
  }
}

function flipResult(result) {
  if (result === 'me') return 'lose';
  if (result === 'opp') return 'win';
  return result;
}

// ==================== 消息处理（双方通用） ====================
function handleMessage(msg) {
  switch (msg.type) {
    case 'round_start':
      if (!iAmHost) {
        updateUIForRound(msg.round, msg.timeLeft);
        showScreen('game');
        startTimer();
        window._roundTimeout = setTimeout(() => handleTimeoutRemote(), ROUND_TIME * 1000);
      }
      break;

    case 'opponent_played':
      oppCardStatus.textContent = '已出牌 ✓';
      oppCardStatus.className = 'card-status played';
      oppCardDisplay.className = 'card-display hidden';
      oppCardDisplay.innerHTML = '<span style="font-size:36px">❓</span><div class="card-label">已准备</div>';
      break;

    case 'card_played':
      // 主机记录对手出牌
      if (iAmHost) {
        oppCard = msg.card;
        if (myCard) resolveRound(myCard, oppCard, null);
      }
      break;

    case 'round_result':
      stopTimer();
      clearTimeout(window._roundTimeout);
      roundActive = false;
      myScore = msg.myScore;
      oppScore = msg.oppScore;

      if (!iAmHost) {
        // 我出牌了吗
        if (myCard) {
          myCardDisplay.className = `card-display ${myCard}`;
          myCardDisplay.innerHTML = `<div class="card-icon">${CARD_EMOJI[myCard]}</div><div class="card-label">${CARD_NAME[myCard]}</div>`;
        }
        if (!myCard) {
          myCardDisplay.className = `card-display ${msg.oppCard}`;
          myCardDisplay.innerHTML = `<div class="card-icon">${CARD_EMOJI[msg.oppCard]}</div><div class="card-label">${CARD_NAME[msg.oppCard]}</div>`;
        }
        oppCardDisplay.className = `card-display ${msg.myCard}`;
        oppCardDisplay.innerHTML = `<div class="card-icon">${CARD_EMOJI[msg.myCard]}</div><div class="card-label">${CARD_NAME[msg.myCard]}</div>`;
      }

      updateScores();
      updateScoreBadge(myScore, oppScore);
      showRoundResult(msg.result);

      if (!msg.matchOver) {
        setTimeout(() => {
          cardHand.classList.remove('played');
          playCards.forEach(c => c.classList.remove('selected'));
          myCardStatus.textContent = '';
          myCardStatus.className = 'card-status';
          oppCardStatus.textContent = '';
          oppCardStatus.className = 'card-status';
        }, 500);
      }
      break;

    case 'match_over':
      if (!iAmHost) {
        const iWon = myScore > oppScore;
        showMatchOver(iWon);
      }
      break;
  }
}

function handleTimeoutRemote() {
  if (!iAmHost) {
    // 如果主机没有在超时前发结果，说明有bug，直接显示等待
    oppCardDisplay.className = 'card-display timeout';
    oppCardDisplay.innerHTML = '<div class="card-icon">⏰</div><div class="card-label">超时</div>';
  }
}

// ==================== UI ====================
function showScreen(name) {
  [menuScreen, waitingScreen, gameScreen].forEach(s => s.classList.remove('active'));
  matchOverlay.classList.remove('show');
  errorOverlay.classList.remove('show');

  if (name === 'menu') menuScreen.classList.add('active');
  else if (name === 'waiting') waitingScreen.classList.add('active');
  else if (name === 'game') gameScreen.classList.add('active');
}

function updateUIForRound(round, timer) {
  gameState = 'playing';
  roundActive = true;
  myCard = null;
  oppCard = null;
  roundResult = null;
  timeLeft = timer;

  resetCards();
  updateScores();
  updateScoreBadge(myScore, oppScore);
  roundResultEl.className = 'round-result';
  roundResultEl.textContent = '';
  resultToast.className = '';
  resultToast.classList.remove('show');
}

function resetCards() {
  myCardDisplay.className = 'card-display placeholder';
  myCardDisplay.innerHTML = '<span>请出牌</span>';
  oppCardDisplay.className = 'card-display placeholder';
  oppCardDisplay.innerHTML = '<span>等待中</span>';
  myCardStatus.textContent = '';
  myCardStatus.className = 'card-status';
  oppCardStatus.textContent = '';
  oppCardStatus.className = 'card-status';
  cardHand.classList.remove('played');
  playCards.forEach(c => c.classList.remove('selected'));
}

function displayCards(mc, oc) {
  myCardDisplay.className = `card-display ${mc || 'timeout'}`;
  myCardDisplay.innerHTML = `<div class="card-icon">${CARD_EMOJI[mc||'timeout']}</div><div class="card-label">${CARD_NAME[mc||'timeout']}</div>`;
  oppCardDisplay.className = `card-display ${oc || 'timeout'}`;
  oppCardDisplay.innerHTML = `<div class="card-icon">${CARD_EMOJI[oc||'timeout']}</div><div class="card-label">${CARD_NAME[oc||'timeout']}</div>`;
}

function updateScores() {
  myScoreDots.innerHTML = '';
  oppScoreDots.innerHTML = '';
  for (let i = 0; i < WIN_SCORE; i++) {
    const dm = document.createElement('div');
    dm.className = 'score-dot' + (i < myScore ? ' won' : '');
    myScoreDots.appendChild(dm);
    const do_ = document.createElement('div');
    do_.className = 'score-dot' + (i < oppScore ? ' won' : '');
    oppScoreDots.appendChild(do_);
  }
}

function updateScoreBadge(my, opp) {
  scoreMeBadge.textContent = my;
  scoreOppBadge.textContent = opp;
}

function showRoundResult(result) {
  roundResultEl.textContent = RESULT_TEXT[result];
  roundResultEl.className = `round-result ${result} show`;
  resultToast.textContent = RESULT_TEXT[result];
  resultToast.className = `${result} show`;
  setTimeout(() => resultToast.classList.remove('show'), 2500);
}

function showMatchOver(won) {
  matchOverlay.className = `show ${won ? 'win' : 'lose'}`;
  finalIcon.textContent = won ? '🏆' : '💔';
  finalTitle.textContent = won ? '恭喜获胜!' : '惜败';
  finalScore.textContent = `最终比分 ${myScore} : ${oppScore}`;
  if (won) spawnConfetti();
}

function showError(msg) {
  if (gameState === 'playing' || gameState === 'round_result') {
    stopTimer();
    clearTimeout(window._roundTimeout);
  }
  $('error-msg').textContent = msg;
  errorOverlay.classList.add('show');
}

// ==================== 计时器 ====================
function startTimer() {
  stopTimer();
  timeLeft = ROUND_TIME;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) stopTimer();
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function updateTimerDisplay() {
  const pct = timeLeft / ROUND_TIME;
  const offset = 138.2 * (1 - pct);
  timerProgress.style.strokeDashoffset = offset;
  timerText.textContent = timeLeft;
  const urgent = timeLeft <= 10;
  timerProgress.classList.toggle('urgent', urgent);
  timerText.classList.toggle('urgent', urgent);
  timerText.style.animation = urgent ? 'timerPulse 0.6s ease-in-out infinite' : '';
}

// ==================== 玩家操作 ====================
function playCard(card) {
  if (!roundActive || myCard) return;
  myCard = card;

  if (iAmHost) {
    // 主机：自己出牌
    myCardDisplay.className = `card-display ${card}`;
    myCardDisplay.innerHTML = `<div class="card-icon">${CARD_EMOJI[card]}</div><div class="card-label">${CARD_NAME[card]}</div>`;
    myCardStatus.textContent = '已出牌 ✓';
    myCardStatus.className = 'card-status played';
    cardHand.classList.add('played');
    highlightSelectedCard(card);

    if (oppCard) {
      resolveRound(myCard, oppCard, null);
    }
  } else {
    // 客人：发给出牌消息给主机
    send({ type:'play', card });
    myCardDisplay.className = `card-display ${card}`;
    myCardDisplay.innerHTML = `<div class="card-icon">${CARD_EMOJI[card]}</div><div class="card-label">${CARD_NAME[card]}</div>`;
    myCardStatus.textContent = '已出牌 ✓';
    myCardStatus.className = 'card-status played';
    cardHand.classList.add('played');
    highlightSelectedCard(card);
  }
}

function highlightSelectedCard(card) {
  playCards.forEach(c => {
    c.classList.remove('selected');
    if (c.classList.contains(card)) c.classList.add('selected');
  });
}

function copyRoomCode() {
  navigator.clipboard.writeText(roomCode).then(() => {
    menuStatus.textContent = '✅ 已复制！发给对手即可';
  }).catch(() => {
    menuStatus.textContent = '请手动复制房间号';
  });
}

function cancelWait() {
  cleanupPeer();
  showScreen('menu');
  $('room-created').style.display = 'none';
}

function restartMatch() {
  stopTimer();
  clearTimeout(window._roundTimeout);
  matchOverlay.classList.remove('show');
  myScore = 0; oppScore = 0;
  myCard = null; oppCard = null;
  gameState = 'idle';
  roundActive = false;
  window._completedRounds = 0;
  resetCards();
  updateScores();
  updateScoreBadge(0, 0);
  roundResultEl.className = 'round-result';
  roundResultEl.textContent = '';
  resultToast.className = '';
  resultToast.classList.remove('show');
  cardHand.classList.remove('played');
  playCards.forEach(c => c.classList.remove('selected'));

  if (iAmHost) {
    startGame();
  }
}

function goMenu() {
  stopTimer();
  clearTimeout(window._roundTimeout);
  cleanupPeer();
  showScreen('menu');
  $('room-created').style.display = 'none';
  myScore = 0; oppScore = 0;
  myCard = null; oppCard = null;
  gameState = 'idle';
  roundActive = false;
  window._completedRounds = 0;
}

function cleanupPeer() {
  if (conn) { conn.close(); conn = null; }
  if (peer) { peer.destroy(); peer = null; }
}

// ==================== 庆祝特效 ====================
function spawnConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti';
  document.body.appendChild(container);
  const colors = ['#ffd54f','#ff6b6b','#4ecdc4','#836fff','#ff8c00','#6ab8e0','#4caf84','#ff4081'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = -(Math.random() * 50) + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 10) + 'px';
    piece.style.height = (6 + Math.random() * 10) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (2 + Math.random() * 3) + 's';
    piece.style.animationDelay = Math.random() * 1.5 + 's';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 5000);
}

// ==================== 初始化 ====================
showScreen('menu');

// 页面关闭时清理
window.addEventListener('beforeunload', () => cleanupPeer());
</script>
