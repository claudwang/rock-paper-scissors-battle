<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>石头剪刀布 · 卡牌对战</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b1a;
  --card-rock-glow:#f0a030;--card-paper-glow:#ffe9b0;--card-scissors-glow:#6ab8e0;
  --accent:#ffd54f;--win:#4caf84;--lose:#e05555;--draw:#d4a844;
  --text:#e8e6f0;--text-dim:#7a7a9a;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none}
body{background:radial-gradient(ellipse at 50% 0%,#1a1a3e 0%,var(--bg) 70%)}

#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;padding:20px}
.screen.active{display:flex}

/* ===== 按钮 ===== */
.btn{padding:14px 40px;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:1px;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(0.95)!important}
.btn-primary{background:linear-gradient(135deg,#ffd54f,#f0a030);color:#1a1a2e;box-shadow:0 4px 24px rgba(240,160,48,0.35)}
.btn-secondary{background:rgba(255,255,255,0.08);color:var(--text-dim);border:1px solid rgba(255,255,255,0.12);padding:10px 28px;font-size:14px}
.btn-play-again{padding:16px 56px;font-size:18px;background:linear-gradient(135deg,#6a5acd,#836fff);color:#fff;box-shadow:0 4px 24px rgba(106,90,205,0.4)}
.btn-confirm{background:linear-gradient(135deg,#4caf84,#2e9b6a);color:#fff;box-shadow:0 4px 24px rgba(76,175,132,0.4);padding:12px 44px;font-size:17px;letter-spacing:2px;min-width:160px}
.btn-confirm:disabled{opacity:0.3;cursor:not-allowed;transform:none!important}
@media(hover:hover){
  .btn-primary:hover{box-shadow:0 6px 32px rgba(240,160,48,0.5);transform:translateY(-2px)}
  .btn-secondary:hover{color:var(--text);border-color:rgba(255,255,255,0.25)}
  .btn-play-again:hover{box-shadow:0 6px 36px rgba(106,90,205,0.55);transform:translateY(-2px)}
  .btn-confirm:hover:not(:disabled){box-shadow:0 6px 32px rgba(76,175,132,0.55);transform:translateY(-2px)}
}

/* ===== 菜单 ===== */
#menu-screen h1{font-size:38px;font-weight:800;background:linear-gradient(135deg,#ffd54f,#f0a030,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;text-align:center;line-height:1.2}
#menu-screen .subtitle{font-size:15px;color:var(--text-dim);margin-bottom:36px;letter-spacing:2px}
.menu-buttons{display:flex;flex-direction:column;gap:14px;align-items:center}
.divider{color:var(--text-dim);font-size:12px;margin:4px 0}
.join-row{display:flex;gap:8px;align-items:center}
.join-row input{width:140px;padding:12px 16px;border-radius:50px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:var(--text);font-size:15px;text-align:center;outline:none;font-family:monospace;letter-spacing:2px}
.join-row input:focus{border-color:var(--accent)}
.join-row input::placeholder{color:var(--text-dim);letter-spacing:1px;font-family:sans-serif;font-size:13px}
.room-code-display{background:rgba(255,255,255,0.06);border:1px dashed rgba(255,200,50,0.3);border-radius:12px;padding:16px 24px;margin:16px 0;text-align:center}
.room-code-display .label{font-size:12px;color:var(--text-dim);margin-bottom:6px}
.room-code-display .code{font-size:32px;font-weight:800;font-family:monospace;letter-spacing:4px;color:var(--accent)}
.status-text{font-size:13px;color:var(--text-dim);margin-top:16px}

/* ===== 等待 ===== */
#waiting-screen h2{font-size:22px;margin-bottom:32px;font-weight:600}
.spinner-dots{display:flex;gap:10px;margin-bottom:16px}
.spinner-dots span{width:12px;height:12px;border-radius:50%;background:var(--accent);animation:dotBounce 1.4s ease-in-out infinite both}
.spinner-dots span:nth-child(2){animation-delay:0.16s}
.spinner-dots span:nth-child(3){animation-delay:0.32s}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.6);opacity:0.4}40%{transform:scale(1);opacity:1}}

/* ===== 开局倒计时 ===== */
#countdown-overlay{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,20,0.93)}
#countdown-overlay.show{display:flex}
#countdown-number{font-size:120px;font-weight:900;color:var(--accent)}
#countdown-label{font-size:22px;color:var(--text-dim);margin-top:8px}
#countdown-overlay.go #countdown-number{color:var(--win)}
.count-pop{animation:countPop 0.5s ease-out}
@keyframes countPop{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.count-go{animation:countGo 0.6s ease-out}
@keyframes countGo{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}

/* ===== 游戏界面 ===== */
.game-topbar{width:100%;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.game-title{font-size:16px;font-weight:700;color:var(--accent);letter-spacing:1px}
.game-info{display:flex;align-items:center;gap:16px}
.round-badge{background:rgba(255,255,255,0.06);padding:5px 14px;border-radius:20px;font-size:14px;font-weight:600;color:var(--text-dim)}
.round-badge b{color:var(--text)}
.timer-circle{position:relative;width:48px;height:48px}
.timer-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-circle .bg{fill:none;stroke:rgba(255,255,255,0.08);stroke-width:4}
.timer-circle .progress{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.timer-circle .progress.urgent{stroke:var(--lose)}
.timer-circle .timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;line-height:1}
.timer-circle .timer-text.urgent{color:var(--lose);animation:timerPulse 0.6s ease-in-out infinite}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* 对战区 */
.game-arena{flex:1;width:100%;max-width:900px;display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 16px;min-height:0}
.player-panel{flex:1;max-width:260px;display:flex;flex-direction:column;align-items:center;gap:8px}
.player-name{font-size:16px;font-weight:700}
.player-name .you{color:#4ecdc4}.player-name .opp{color:#ff6b6b}
.score-dots{display:flex;gap:5px}
.score-dot{width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,0.1);transition:all 0.3s}
.score-dot.won{background:var(--win);box-shadow:0 0 8px rgba(76,175,132,0.5)}

.card-display{width:110px;height:154px;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;transition:all 0.4s ease}
.card-display.placeholder{background:rgba(255,255,255,0.03);border:2px dashed rgba(255,255,255,0.1);font-size:13px;color:var(--text-dim)}
.card-display .card-icon{font-size:44px}
.card-display .card-label{font-size:12px;font-weight:600}
.card-display.rock{background:linear-gradient(145deg,#5a3e14,#3d2a0c);border:2px solid var(--card-rock-glow);box-shadow:0 0 20px rgba(240,160,48,0.2)}
.card-display.paper{background:linear-gradient(145deg,#8a8070,#5a5244);border:2px solid var(--card-paper-glow);box-shadow:0 0 20px rgba(255,233,176,0.15)}
.card-display.scissors{background:linear-gradient(145deg,#2a4a60,#1a3040);border:2px solid var(--card-scissors-glow);box-shadow:0 0 20px rgba(106,184,224,0.15)}
.card-display.timeout{background:rgba(180,40,40,0.2);border:2px solid var(--lose)}
.card-display.hidden{background:linear-gradient(145deg,#2a2040,#1a1030);border:2px solid rgba(255,255,255,0.15)}
.card-status{font-size:12px;color:var(--text-dim);height:16px}
.card-status.played{color:var(--accent)}

/* VS 区 */
.vs-zone{display:flex;flex-direction:column;align-items:center;gap:10px;min-width:80px}
.vs-text{font-size:26px;font-weight:800;background:linear-gradient(135deg,#ffd54f,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.round-result{font-size:18px;font-weight:700;padding:6px 16px;border-radius:16px;opacity:0;transform:scale(0.3);transition:none}
.round-result.show{opacity:1;transform:scale(1);animation:resultPop 0.35s ease-out}
.round-result.win{color:var(--win);background:rgba(76,175,132,0.15)}
.round-result.lose{color:var(--lose);background:rgba(224,85,85,0.15)}
.round-result.draw{color:var(--draw);background:rgba(212,168,68,0.15)}
@keyframes resultPop{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

/* ===== 出牌区 ===== */
.card-hand-area{width:100%;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:10px;padding:6px 16px 16px}
.card-hand{display:flex;align-items:flex-end;justify-content:center;gap:16px}

/* 卡牌基础样式 — 唯一的 transform 控制 */
.play-card{
  width:100px;height:140px;border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;color:#fff;font-weight:600;border:2px solid transparent;
  -webkit-user-select:none;user-select:none;
  /* 核心：transition 驱动所有 transform 变化，无 animation */
  transform:translateY(0);
  transition:transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s, opacity 0.25s;
}
.play-card .card-icon{font-size:38px}
.play-card .card-label{font-size:13px;letter-spacing:2px}

/* 各牌样式 */
.play-card.rock{background:linear-gradient(160deg,#6b4c1e,#3d2a0c);border-color:var(--card-rock-glow);box-shadow:0 6px 24px rgba(155,107,28,0.3)}
.play-card.paper{background:linear-gradient(160deg,#9a9078,#5a5244);border-color:var(--card-paper-glow);box-shadow:0 6px 24px rgba(200,180,140,0.25)}
.play-card.scissors{background:linear-gradient(160deg,#3a5c78,#1a3040);border-color:var(--card-scissors-glow);box-shadow:0 6px 24px rgba(74,124,155,0.25)}

/* 桌面 hover 浮起 */
@media(hover:hover){
  .play-card:not(.chosen):not(.disabled):hover{transform:translateY(-10px)}
  .play-card.rock:hover{box-shadow:0 10px 36px rgba(240,160,48,0.45)}
  .play-card.paper:hover{box-shadow:0 10px 36px rgba(255,233,176,0.4)}
  .play-card.scissors:hover{box-shadow:0 10px 36px rgba(106,184,224,0.4)}
}

/* 选中态：卡牌浮起 — 只靠这一个 transform */
.play-card.chosen{
  transform:translateY(-16px) scale(1.05);
  box-shadow:0 10px 40px rgba(255,213,79,0.35);
  border-color:var(--accent);
}

/* 已出牌态：所有牌变暗不可点 */
.play-card.disabled{opacity:0.3;cursor:not-allowed;pointer-events:none}

/* 出牌按钮区 */
#play-btn-area{height:48px;display:flex;align-items:center;justify-content:center}
#play-btn-area .btn-confirm{animation:btnAppear 0.25s ease-out}
@keyframes btnAppear{0%{opacity:0;transform:scale(0.8)}100%{opacity:1;transform:scale(1)}}

/* ===== 比赛结束 ===== */
#match-over-overlay{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(5,5,20,0.92);backdrop-filter:blur(8px)}
#match-over-overlay.show{display:flex}
#match-over-overlay .result-icon{font-size:80px;margin-bottom:16px}
#match-over-overlay .result-title{font-size:32px;font-weight:800;margin-bottom:8px}
#match-over-overlay .result-score{font-size:18px;color:var(--text-dim);margin-bottom:36px}
#match-over-overlay.win .result-title{color:var(--win)}
#match-over-overlay.lose .result-title{color:var(--lose)}

/* ===== 移动端 ===== */
@media(max-width:640px){
  #menu-screen h1{font-size:28px}
  .game-arena{gap:6px;padding:4px 10px}
  .player-panel{max-width:110px;gap:5px}
  .player-name{font-size:13px}
  .score-dots{gap:3px}
  .score-dot{width:9px;height:9px}
  .card-display{width:80px;height:115px}
  .card-display .card-icon{font-size:32px}
  .card-display .card-label{font-size:10px}
  .card-hand-area{gap:8px;padding:4px 10px 12px}
  .card-hand{gap:10px}
  .play-card{width:85px;height:120px}
  .play-card .card-icon{font-size:30px}
  .play-card .card-label{font-size:11px}
  .vs-zone{min-width:60px}
  .vs-text{font-size:20px}
  .round-result{font-size:15px;padding:4px 12px}
  .game-topbar{padding:8px 12px}
  .round-badge{font-size:12px;padding:4px 10px}
  .timer-circle{width:40px;height:40px}
  .timer-circle .timer-text{font-size:12px}
  #countdown-number{font-size:80px}
  .btn-confirm{padding:10px 36px;font-size:15px;min-width:140px}
}
</style>
</head>
<body>
<div id="app">
  <!-- 菜单 -->
  <div id="menu-screen" class="screen active">
    <h1>石头剪刀布</h1>
    <div class="subtitle">卡 牌 对 战</div>
    <div class="menu-buttons">
      <button class="btn btn-primary" onclick="createRoom()">⚔ 创建房间</button>
      <div class="divider">— 或输入房间号加入 —</div>
      <div class="join-row">
        <input type="text" id="room-input" placeholder="房间号" maxlength="6" autocomplete="off">
        <button class="btn btn-secondary" onclick="joinRoom()">加入</button>
      </div>
    </div>
    <div class="room-code-display" id="room-created" style="display:none">
      <div class="label">你的房间号（发给对手）</div>
      <div class="code" id="room-code-text"></div>
      <button class="btn btn-secondary" onclick="copyRoomCode()" style="margin-top:10px">📋 复制房间号</button>
    </div>
    <div class="status-text" id="menu-status"></div>
  </div>

  <!-- 等待 -->
  <div id="waiting-screen" class="screen">
    <h2 id="waiting-title">等待对手加入...</h2>
    <div class="spinner-dots"><span></span><span></span><span></span></div>
    <div class="room-code-display" id="waiting-room-code">
      <div class="label">房间号</div>
      <div class="code" id="waiting-code-text"></div>
    </div>
    <button class="btn btn-secondary" onclick="leaveRoom()">取消</button>
  </div>

  <!-- 开局倒计时 -->
  <div id="countdown-overlay">
    <div id="countdown-number">3</div>
    <div id="countdown-label">准备开始!</div>
  </div>

  <!-- 游戏 -->
  <div id="game-screen" class="screen">
    <div class="game-topbar">
      <div class="game-title">⚔ 石头剪刀布</div>
      <div class="game-info">
        <div class="round-badge">你 <b id="score-me">0</b> : <b id="score-opp">0</b> 对手</div>
        <div class="timer-circle">
          <svg viewBox="0 0 48 48">
            <circle class="bg" cx="24" cy="24" r="20"/>
            <circle class="progress" id="timer-progress" cx="24" cy="24" r="20" stroke-dasharray="125.66" stroke-dashoffset="0"/>
          </svg>
          <span class="timer-text" id="timer-text">30</span>
        </div>
      </div>
    </div>
    <div class="game-arena">
      <div class="player-panel">
        <div class="player-name"><span class="you">●</span> 你</div>
        <div class="score-dots" id="my-score-dots"></div>
        <div class="card-display placeholder" id="my-card-display"><span>请出牌</span></div>
        <div class="card-status" id="my-card-status"></div>
      </div>
      <div class="vs-zone">
        <div class="vs-text">VS</div>
        <div class="round-result" id="round-result"></div>
      </div>
      <div class="player-panel">
        <div class="player-name"><span class="opp">●</span> 对手</div>
        <div class="score-dots" id="opp-score-dots"></div>
        <div class="card-display placeholder" id="opp-card-display"><span>等待中</span></div>
        <div class="card-status" id="opp-card-status"></div>
      </div>
    </div>
    <!-- 出牌区：卡牌 + 出牌按钮 -->
    <div class="card-hand-area">
      <div class="card-hand" id="card-hand">
        <div class="play-card rock" onclick="chooseCard('rock')"><div class="card-icon">🪨</div><div class="card-label">石头</div></div>
        <div class="play-card paper" onclick="chooseCard('paper')"><div class="card-icon">📄</div><div class="card-label">布</div></div>
        <div class="play-card scissors" onclick="chooseCard('scissors')"><div class="card-icon">✂️</div><div class="card-label">剪刀</div></div>
      </div>
      <div id="play-btn-area"></div>
    </div>
  </div>

  <div id="match-over-overlay">
    <div class="result-icon" id="final-icon"></div>
    <div class="result-title" id="final-title"></div>
    <div class="result-score" id="final-score"></div>
    <button class="btn btn-play-again" onclick="restartMatch()">🔄 再来一局</button>
  </div>
</div>

<script>
const WIN_SCORE = 5, ROUND_TIME = 30;
const CIRCUMFERENCE = 2 * Math.PI * 20;
const CARD_EMOJI = { rock:'🪨', paper:'📄', scissors:'✂️', timeout:'⏰' };
const CARD_NAME  = { rock:'石头', paper:'布', scissors:'剪刀', timeout:'超时' };
const RESULT_TEXT = { win:'你赢了!', lose:'你输了', draw:'平局' };

// ===== 状态 =====
let ws = null, connected = false, gameState = 'idle', roomCode = '', iAmHost = false;
let myCard = null, chosenCard = null, myScore = 0, oppScore = 0;
let timerInterval = null, timeLeft = ROUND_TIME;

// ===== DOM =====
const $ = id => document.getElementById(id);
const menuScreen = $('menu-screen'), waitingScreen = $('waiting-screen'), gameScreen = $('game-screen');
const countdownOverlay = $('countdown-overlay'), countdownNum = $('countdown-number'), countdownLabel = $('countdown-label');
const matchOverlay = $('match-over-overlay');
const roundResultEl = $('round-result'), timerTextEl = $('timer-text'), timerProgress = $('timer-progress');
const cardHandEl = $('card-hand'), myCardDisplay = $('my-card-display'), oppCardDisplay = $('opp-card-display');
const myCardStatus = $('my-card-status'), oppCardStatus = $('opp-card-status');
const myScoreDots = $('my-score-dots'), oppScoreDots = $('opp-score-dots');
const scoreMeBadge = $('score-me'), scoreOppBadge = $('score-opp');
const menuStatus = $('menu-status'), finalIcon = $('final-icon'), finalTitle = $('final-title'), finalScore = $('final-score');
const playBtnArea = $('play-btn-area');
const playCards = document.querySelectorAll('.play-card');

// ===== WebSocket =====
function connect() {
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
  const p = location.protocol === 'https:' ? 'wss:' : 'ws:';
  menuStatus.textContent = '正在连接服务器...';
  ws = new WebSocket(p + '//' + location.host);
  ws.onopen = () => { connected = true; menuStatus.textContent = '✅ 已连接'; };
  ws.onmessage = e => { try { handleMessage(JSON.parse(e.data)); } catch(err) { console.error(err); } };
  ws.onclose = () => {
    connected = false; ws = null;
    if (gameState === 'playing' || gameState === 'round_result') alert('连接断开，请刷新重试');
    showScreen('menu'); menuStatus.textContent = '❌ 连接断开，请刷新页面';
  };
  ws.onerror = () => { menuStatus.textContent = '❌ 连接失败'; };
}
function send(msg) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg)); }

// ===== 消息处理 =====
function handleMessage(msg) {
  switch (msg.type) {
    case 'room_created':
      roomCode = msg.code; iAmHost = true; gameState = 'waiting';
      $('room-code-text').textContent = roomCode;
      $('room-created').style.display = 'block';
      $('waiting-code-text').textContent = roomCode;
      $('waiting-room-code').style.display = 'block';
      $('waiting-title').textContent = '等待对手加入...';
      showScreen('waiting');
      break;
    case 'opponent_joined':
      $('waiting-title').textContent = '对手已加入!';
      break;
    case 'room_joined':
      roomCode = msg.code; iAmHost = false; gameState = 'waiting';
      $('waiting-title').textContent = '已加入房间!';
      $('waiting-room-code').style.display = 'none';
      showScreen('waiting');
      break;
    case 'room_error':
      alert(msg.message); menuStatus.textContent = '加入失败: ' + msg.message;
      break;
    case 'room_left':
      showScreen('menu'); menuStatus.textContent = '已取消';
      break;
    case 'game_countdown':
      showCountdown(msg.seconds);
      if (msg.seconds === 0) setTimeout(() => { countdownOverlay.classList.remove('show','go'); showScreen('game'); }, 600);
      break;
    case 'round_start':
      gameState = 'playing'; myCard = null; chosenCard = null;
      timeLeft = msg.timeLeft; myScore = msg.myScore; oppScore = msg.oppScore;
      resetCards(); startTimer(msg.timeLeft);
      updateScoreBadge(msg.myScore, msg.oppScore);
      break;
    case 'opponent_played':
      oppCardStatus.textContent = '已出牌 ✓'; oppCardStatus.className = 'card-status played';
      oppCardDisplay.className = 'card-display hidden';
      oppCardDisplay.innerHTML = '<span style="font-size:36px">❓</span><div class="card-label">已准备</div>';
      break;
    case 'card_played':
      // 服务器确认出牌成功
      myCard = msg.card;
      myCardStatus.textContent = '已出牌 ✓'; myCardStatus.className = 'card-status played';
      // 所有牌变暗
      playCards.forEach(c => { c.classList.remove('chosen'); c.classList.add('disabled'); });
      playBtnArea.innerHTML = '';
      // 上方显示我出的牌
      myCardDisplay.className = 'card-display ' + msg.card;
      myCardDisplay.innerHTML = '<div class="card-icon">' + CARD_EMOJI[msg.card] + '</div><div class="card-label">' + CARD_NAME[msg.card] + '</div>';
      break;
    case 'round_result':
      gameState = 'round_result'; myScore = msg.myScore; oppScore = msg.oppScore; stopTimer();
      oppCardDisplay.className = 'card-display ' + msg.oppCard;
      oppCardDisplay.innerHTML = '<div class="card-icon">' + CARD_EMOJI[msg.oppCard] + '</div><div class="card-label">' + CARD_NAME[msg.oppCard] + '</div>';
      oppCardStatus.textContent = ''; oppCardStatus.className = 'card-status';
      if (!myCard) {
        myCardDisplay.className = 'card-display ' + msg.myCard;
        myCardDisplay.innerHTML = '<div class="card-icon">' + CARD_EMOJI[msg.myCard] + '</div><div class="card-label">' + CARD_NAME[msg.myCard] + '</div>';
      }
      myCardStatus.textContent = ''; myCardStatus.className = 'card-status';
      updateScores(); updateScoreBadge(msg.myScore, msg.oppScore);
      showRoundResult(msg.result);
      break;
    case 'match_over':
      gameState = 'match_over'; stopTimer();
      myScore = msg.myScore; oppScore = msg.oppScore;
      updateScores(); showMatchOver(myScore > oppScore);
      break;
    case 'opponent_disconnected':
      alert('对手断开了连接');
      resetGame(); showScreen('menu');
      break;
    case 'pong': break;
  }
}

// ===== UI =====
function showScreen(n) {
  [menuScreen, waitingScreen, gameScreen].forEach(s => s.classList.remove('active'));
  matchOverlay.classList.remove('show');
  if (n === 'menu') menuScreen.classList.add('active');
  else if (n === 'waiting') waitingScreen.classList.add('active');
  else if (n === 'game') gameScreen.classList.add('active');
}

function showCountdown(s) {
  countdownOverlay.classList.add('show');
  countdownOverlay.classList.toggle('go', s === 0);
  countdownNum.textContent = s === 0 ? 'GO!' : s;
  countdownLabel.textContent = s === 0 ? '' : s === 1 ? '准备好了吗...' : '';
  countdownNum.classList.remove('count-pop','count-go');
  void countdownNum.offsetWidth;
  countdownNum.classList.add(s === 0 ? 'count-go' : 'count-pop');
}

// ===== 选牌 & 出牌 =====
function chooseCard(card) {
  if (gameState !== 'playing' || myCard) return;

  // 切换选中态
  if (chosenCard === card) {
    // 再次点击同一张 → 取消选中
    chosenCard = null;
    playCards.forEach(c => c.classList.remove('chosen'));
    playBtnArea.innerHTML = '';
    return;
  }

  chosenCard = card;

  // 卡牌浮起（只靠 transition + transform，0 animation）
  playCards.forEach(c => {
    c.classList.remove('chosen');
    if (c.classList.contains(card)) c.classList.add('chosen');
  });

  // 显示出牌按钮
  playBtnArea.innerHTML = '<button class="btn btn-confirm" onclick="confirmPlay()">⚔ 出牌</button>';
}

function confirmPlay() {
  if (!chosenCard || myCard) return;
  send({ type: 'play', card: chosenCard });
  // 牌立即复位（移除 chosen），等服务器 card_played 再变暗
  playCards.forEach(c => c.classList.remove('chosen'));
  playBtnArea.innerHTML = '';
}

// ===== 重置 =====
function resetCards() {
  myCardDisplay.className = 'card-display placeholder';
  myCardDisplay.innerHTML = '<span>请出牌</span>';
  oppCardDisplay.className = 'card-display placeholder';
  oppCardDisplay.innerHTML = '<span>等待中</span>';
  myCardStatus.textContent = ''; myCardStatus.className = 'card-status';
  oppCardStatus.textContent = ''; oppCardStatus.className = 'card-status';
  chosenCard = null;
  playCards.forEach(c => { c.classList.remove('chosen', 'disabled'); });
  playBtnArea.innerHTML = '';
  roundResultEl.className = 'round-result'; roundResultEl.textContent = '';
}

// ===== 比分 =====
function updateScores() {
  myScoreDots.innerHTML = ''; oppScoreDots.innerHTML = '';
  for (let i = 0; i < WIN_SCORE; i++) {
    let dm = document.createElement('div'); dm.className = 'score-dot' + (i < myScore ? ' won' : ''); myScoreDots.appendChild(dm);
    let d2 = document.createElement('div'); d2.className = 'score-dot' + (i < oppScore ? ' won' : ''); oppScoreDots.appendChild(d2);
  }
}
function updateScoreBadge(m, o) { scoreMeBadge.textContent = m; scoreOppBadge.textContent = o; }

// ===== 结果 =====
function showRoundResult(r) {
  roundResultEl.textContent = RESULT_TEXT[r];
  roundResultEl.className = 'round-result';
  void roundResultEl.offsetWidth;
  roundResultEl.classList.add(r, 'show');
}

function showMatchOver(won) {
  matchOverlay.className = 'show ' + (won ? 'win' : 'lose');
  finalIcon.textContent = won ? '🏆' : '💔';
  finalTitle.textContent = won ? '恭喜获胜!' : '惜败';
  finalScore.textContent = '最终比分 ' + myScore + ' : ' + oppScore;
  if (won) spawnConfetti();
}

// ===== 计时器 =====
function startTimer(t) {
  stopTimer(); timeLeft = t; updateTimerDisplay();
  timerInterval = setInterval(() => { timeLeft--; updateTimerDisplay(); if (timeLeft <= 0) stopTimer(); }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function updateTimerDisplay() {
  const pct = timeLeft / ROUND_TIME;
  timerProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
  timerTextEl.textContent = timeLeft;
  const u = timeLeft <= 10;
  timerProgress.classList.toggle('urgent', u);
  timerTextEl.classList.toggle('urgent', u);
}

// ===== 房间操作 =====
function createRoom() { if (!connected) connect(); send({ type: 'create_room' }); }
function joinRoom() {
  const code = $('room-input').value.trim().toUpperCase();
  if (!code || code.length < 4) { menuStatus.textContent = '请输入有效的房间号'; return; }
  if (!connected) connect();
  send({ type: 'join_room', code });
}
function leaveRoom() { send({ type: 'leave_room' }); showScreen('menu'); }
function copyRoomCode() {
  navigator.clipboard.writeText(roomCode)
    .then(() => menuStatus.textContent = '✅ 已复制!')
    .catch(() => menuStatus.textContent = '请手动复制: ' + roomCode);
}

function restartMatch() { matchOverlay.classList.remove('show'); resetCards(); resetGame(); showScreen('menu'); }

function resetGame() {
  myScore = 0; oppScore = 0; myCard = null; chosenCard = null; gameState = 'idle'; stopTimer();
  playCards.forEach(c => { c.classList.remove('chosen', 'disabled'); });
  playBtnArea.innerHTML = '';
  updateScores(); scoreMeBadge.textContent = '0'; scoreOppBadge.textContent = '0';
  roundResultEl.className = 'round-result'; roundResultEl.textContent = '';
  matchOverlay.classList.remove('show');
  $('room-created').style.display = 'none';
}

// ===== 彩带 =====
function spawnConfetti() {
  const c = document.createElement('div'); c.className = 'confetti'; document.body.appendChild(c);
  const cl = ['#ffd54f','#ff6b6b','#4ecdc4','#836fff','#ff8c00','#6ab8e0','#4caf84','#ff4081'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.left = Math.random()*100+'%'; p.style.top = -(Math.random()*50)+'px';
    p.style.background = cl[Math.floor(Math.random()*cl.length)];
    p.style.width = (6+Math.random()*10)+'px'; p.style.height = (6+Math.random()*10)+'px';
    p.style.borderRadius = Math.random()>0.5?'50%':'2px';
    p.style.animationDuration = (2+Math.random()*3)+'s'; p.style.animationDelay = Math.random()*1.5+'s';
    c.appendChild(p);
  }
  setTimeout(() => c.remove(), 5000);
}

// ===== 心跳 & 初始化 =====
setInterval(() => { if (ws && ws.readyState === WebSocket.OPEN) send({ type: 'ping' }); }, 30000);
showScreen('menu');
connect();
</script>
