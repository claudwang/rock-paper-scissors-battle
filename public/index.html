<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>石头剪刀布 · 卡牌对战</title>
<style>
/* ==================== Reset & Variables ==================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080812;--bg-secondary:#0e0e22;
  --card-rock:#c87533;--card-rock-dark:#8b4a1a;--card-rock-glow:#f0a030;
  --card-paper:#b0a890;--card-paper-dark:#6a5e48;--card-paper-glow:#ffe9b0;
  --card-scissors:#5090b8;--card-scissors-dark:#2a4a68;--card-scissors-glow:#6ab8e0;
  --accent:#ffd54f;--accent-dark:#d4a020;
  --win:#4caf84;--win-glow:rgba(76,175,132,0.4);
  --lose:#e05555;--lose-glow:rgba(224,85,85,0.4);
  --draw:#d4a844;
  --text:#eae8f2;--text-dim:#6a6a8a;--text-muted:#4a4a6a;
  --glass:rgba(255,255,255,0.04);--glass-border:rgba(255,255,255,0.08);
  --glass-highlight:rgba(255,255,255,0.06);
}

html,body{height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;user-select:none}
body{position:relative}

/* ==================== Particle Canvas Background ==================== */
#particles-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ==================== App Shell ==================== */
#app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;padding:20px;position:relative}
.screen.active{display:flex}

/* ==================== Toast Notifications ==================== */
#toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;backdrop-filter:blur(12px);pointer-events:auto;
  animation:toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.success{background:rgba(76,175,132,0.2);border:1px solid rgba(76,175,132,0.3);color:var(--win)}
.toast.error{background:rgba(224,85,85,0.2);border:1px solid rgba(224,85,85,0.3);color:var(--lose)}
.toast.warning{background:rgba(255,213,79,0.2);border:1px solid rgba(255,213,79,0.3);color:var(--accent)}
.toast.out{animation:toastOut 0.3s ease-in forwards}
@keyframes toastIn{0%{opacity:0;transform:translateY(-20px) scale(0.9)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-10px)}}

/* ==================== Buttons ==================== */
.btn{padding:14px 40px;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;
  transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);letter-spacing:1px;-webkit-user-select:none;user-select:none;
  position:relative;overflow:hidden}
.btn:active{transform:scale(0.93)!important}
.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 50%);border-radius:inherit;pointer-events:none}
.btn-primary{background:linear-gradient(135deg,#ffd54f,#f0a030);color:#1a1a2e;box-shadow:0 4px 24px rgba(240,160,48,0.3),inset 0 1px 0 rgba(255,255,255,0.2)}
.btn-secondary{background:var(--glass);color:var(--text-dim);border:1px solid var(--glass-border);padding:10px 28px;font-size:14px;backdrop-filter:blur(8px)}
.btn-secondary::after{display:none}
.btn-play-again{padding:16px 56px;font-size:18px;background:linear-gradient(135deg,#6a5acd,#836fff);color:#fff;
  box-shadow:0 4px 24px rgba(106,90,205,0.35),inset 0 1px 0 rgba(255,255,255,0.15)}
.btn-confirm{background:linear-gradient(135deg,#4caf84,#2e9b6a);color:#fff;
  box-shadow:0 4px 24px rgba(76,175,132,0.35),inset 0 1px 0 rgba(255,255,255,0.15);
  padding:12px 44px;font-size:17px;letter-spacing:2px;min-width:160px}
.btn-confirm:disabled{opacity:0.3;cursor:not-allowed;transform:none!important}
@media(hover:hover){
  .btn-primary:hover{box-shadow:0 6px 36px rgba(240,160,48,0.45);transform:translateY(-2px)}
  .btn-secondary:hover{color:var(--text);border-color:rgba(255,255,255,0.2);background:var(--glass-highlight)}
  .btn-play-again:hover{box-shadow:0 6px 40px rgba(106,90,205,0.5);transform:translateY(-2px)}
  .btn-confirm:hover:not(:disabled){box-shadow:0 6px 36px rgba(76,175,132,0.5);transform:translateY(-2px)}
}

/* ==================== Menu Screen ==================== */
.menu-content{text-align:center}
.menu-logo{margin-bottom:8px}
.menu-title{font-size:42px;font-weight:900;line-height:1.1;margin-bottom:4px;
  background:linear-gradient(135deg,#ffd54f 0%,#ff8c00 50%,#ff6b6b 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 8px rgba(255,140,0,0.3))}
.menu-subtitle{font-size:16px;color:var(--text-dim);margin-bottom:40px;letter-spacing:6px;text-transform:uppercase;font-weight:300}
.menu-buttons{display:flex;flex-direction:column;gap:14px;align-items:center}
.divider{color:var(--text-muted);font-size:12px;margin:4px 0;letter-spacing:2px}
.join-row{display:flex;gap:8px;align-items:center}
.join-row input{width:160px;padding:12px 16px;border-radius:50px;border:1px solid var(--glass-border);
  background:var(--glass);color:var(--text);font-size:16px;text-align:center;outline:none;
  font-family:'Courier New',monospace;letter-spacing:4px;backdrop-filter:blur(8px);transition:all 0.25s}
.join-row input:focus{border-color:var(--accent);box-shadow:0 0 20px rgba(255,213,79,0.15)}
.join-row input::placeholder{color:var(--text-muted);letter-spacing:1px;font-family:sans-serif;font-size:13px}
.room-code-box{margin-top:20px;background:var(--glass);border:1px solid rgba(255,200,50,0.15);
  border-radius:16px;padding:20px 28px;backdrop-filter:blur(12px);opacity:0;transform:scale(0.9);transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.room-code-box.visible{opacity:1;transform:scale(1)}
.room-code-box .label{font-size:12px;color:var(--text-dim);margin-bottom:8px;letter-spacing:1px}
.room-code-box .code{font-size:36px;font-weight:900;font-family:'Courier New',monospace;letter-spacing:6px;
  color:var(--accent);text-shadow:0 0 20px rgba(255,213,79,0.3)}
.status-text{font-size:13px;color:var(--text-dim);margin-top:16px;min-height:20px}
.menu-footer{position:absolute;bottom:20px;font-size:11px;color:var(--text-muted);letter-spacing:1px}

/* ==================== Waiting Screen ==================== */
#waiting-screen h2{font-size:22px;margin-bottom:32px;font-weight:600}
.spinner-dots{display:flex;gap:12px;margin-bottom:20px}
.spinner-dots span{width:14px;height:14px;border-radius:50%;background:var(--accent);
  animation:dotBounce 1.4s ease-in-out infinite both;box-shadow:0 0 12px rgba(255,213,79,0.4)}
.spinner-dots span:nth-child(2){animation-delay:0.16s}
.spinner-dots span:nth-child(3){animation-delay:0.32s}
@keyframes dotBounce{0%,80%,100%{transform:scale(0.5);opacity:0.3}40%{transform:scale(1);opacity:1}}

/* ==================== Countdown Overlay ==================== */
#countdown-overlay{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(4,4,14,0.95);backdrop-filter:blur(16px)}
#countdown-overlay.show{display:flex}
#countdown-number{font-size:140px;font-weight:900;color:var(--accent);
  text-shadow:0 0 40px rgba(255,213,79,0.4),0 0 80px rgba(255,213,79,0.2)}
#countdown-label{font-size:20px;color:var(--text-dim);margin-top:8px;letter-spacing:2px}
#countdown-overlay.go #countdown-number{color:var(--win);text-shadow:0 0 40px var(--win-glow),0 0 80px var(--win-glow)}
.count-pop{animation:countPop 0.5s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes countPop{0%{transform:scale(0.2);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.count-go{animation:countGo 0.6s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes countGo{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}

/* ==================== Game Screen ==================== */
.game-topbar{width:100%;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  background:rgba(8,8,18,0.5);backdrop-filter:blur(8px)}
.game-title{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:1px;opacity:0.8}
.game-info{display:flex;align-items:center;gap:14px}
.score-badge{background:var(--glass);border:1px solid var(--glass-border);padding:6px 16px;border-radius:20px;
  font-size:14px;font-weight:600;color:var(--text-dim);font-variant-numeric:tabular-nums}
.score-badge b{color:var(--text);font-size:16px}
.score-badge .me{color:var(--win)}.score-badge .opp{color:var(--lose)}
.timer-circle{position:relative;width:48px;height:48px}
.timer-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-circle .bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:4}
.timer-circle .progress{fill:none;stroke:var(--accent);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke 0.5s}
.timer-circle .progress.urgent{stroke:var(--lose)}
.timer-circle .timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums;transition:color 0.5s}
.timer-circle .timer-text.urgent{color:var(--lose);animation:timerPulse 0.5s ease-in-out infinite}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

/* ==================== Game Arena ==================== */
.game-arena{flex:1;width:100%;max-width:960px;display:flex;align-items:center;justify-content:center;gap:20px;padding:8px 16px;min-height:0}

/* Player Panel */
.player-panel{flex:1;max-width:280px;display:flex;flex-direction:column;align-items:center;gap:10px}
.player-name{font-size:16px;font-weight:700;display:flex;align-items:center;gap:6px}
.player-name .you{color:#4ecdc4;font-size:10px}.player-name .opp{color:#ff6b6b;font-size:10px}

/* Score Progress Bar */
.score-bar{width:100%;max-width:200px;height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;display:flex}
.score-bar .fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.score-bar .fill.me{background:linear-gradient(90deg,var(--win),#66d4a8);box-shadow:0 0 10px var(--win-glow)}
.score-bar .fill.opp{background:linear-gradient(90deg,var(--lose),#ff8888);box-shadow:0 0 10px var(--lose-glow)}
.score-label{font-size:12px;color:var(--text-dim);font-variant-numeric:tabular-nums}

/* Card Display Area */
.card-display{width:120px;height:168px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);position:relative;overflow:hidden}
.card-display.placeholder{background:var(--glass);border:2px dashed rgba(255,255,255,0.08);font-size:13px;color:var(--text-muted)}
.card-display .card-icon{font-size:48px;line-height:1}
.card-display .card-label{font-size:12px;font-weight:600;letter-spacing:1px}

/* Card Types */
.card-display.rock{background:linear-gradient(145deg,#5a3e14,#3d2a0c);border:2px solid var(--card-rock-glow);
  box-shadow:0 0 24px rgba(240,160,48,0.15),inset 0 1px 0 rgba(255,255,255,0.08)}
.card-display.paper{background:linear-gradient(145deg,#7a7060,#4a4238);border:2px solid var(--card-paper-glow);
  box-shadow:0 0 24px rgba(255,233,176,0.1),inset 0 1px 0 rgba(255,255,255,0.08)}
.card-display.scissors{background:linear-gradient(145deg,#2a4a60,#1a3040);border:2px solid var(--card-scissors-glow);
  box-shadow:0 0 24px rgba(106,184,224,0.12),inset 0 1px 0 rgba(255,255,255,0.08)}
.card-display.timeout{background:rgba(120,30,30,0.3);border:2px solid var(--lose);
  box-shadow:0 0 24px var(--lose-glow)}
.card-display.hidden{background:linear-gradient(145deg,#2a2040,#1a1030);border:2px solid rgba(255,255,255,0.12)}

/* Card Reveal Animation */
.card-display.reveal{animation:cardReveal 0.6s cubic-bezier(0.25,0.46,0.45,0.94)}
@keyframes cardReveal{0%{transform:scale(0.7) rotateY(90deg);opacity:0}50%{transform:scale(1.05) rotateY(0deg);opacity:1}100%{transform:scale(1)}}
.card-display.win-glow{animation:cardReveal 0.6s cubic-bezier(0.25,0.46,0.45,0.94),winPulse 1.5s ease-in-out 0.6s infinite}
@keyframes winPulse{0%,100%{box-shadow:0 0 20px var(--win-glow)}50%{box-shadow:0 0 40px var(--win-glow),0 0 60px rgba(76,175,132,0.15)}}

.card-status{font-size:12px;color:var(--text-muted);height:18px;transition:color 0.3s}
.card-status.played{color:var(--accent)}

/* VS Zone */
.vs-zone{display:flex;flex-direction:column;align-items:center;gap:12px;min-width:80px}
.vs-text{font-size:28px;font-weight:900;letter-spacing:2px;
  background:linear-gradient(135deg,#ffd54f,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 8px rgba(255,140,0,0.3));animation:vsFloat 3s ease-in-out infinite}
@keyframes vsFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.round-result{font-size:18px;font-weight:700;padding:8px 20px;border-radius:16px;opacity:0;transform:scale(0.3);
  backdrop-filter:blur(8px);border:1px solid transparent}
.round-result.show{opacity:1;transform:scale(1);animation:resultPop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
.round-result.win{color:var(--win);background:rgba(76,175,132,0.12);border-color:rgba(76,175,132,0.2)}
.round-result.lose{color:var(--lose);background:rgba(224,85,85,0.12);border-color:rgba(224,85,85,0.2)}
.round-result.draw{color:var(--draw);background:rgba(212,168,68,0.12);border-color:rgba(212,168,68,0.2)}
@keyframes resultPop{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* ==================== Card Hand (Playable Cards) ==================== */
.card-hand-area{width:100%;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:12px;padding:8px 16px 20px}
.card-hand{display:flex;align-items:flex-end;justify-content:center;gap:20px}

.play-card{
  width:108px;height:150px;border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  cursor:pointer;color:#fff;font-weight:600;border:2px solid transparent;
  -webkit-user-select:none;user-select:none;position:relative;overflow:hidden;
  transform:translateY(0);
  transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.3s,opacity 0.3s,border-color 0.3s}
.play-card::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.1) 0%,transparent 40%);border-radius:inherit;pointer-events:none}
.play-card .card-icon{font-size:42px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
.play-card .card-label{font-size:13px;letter-spacing:2px;font-weight:600;opacity:0.9}
.play-card .card-key{position:absolute;top:8px;right:10px;font-size:10px;opacity:0.3;font-weight:400;letter-spacing:0}

/* Card Types */
.play-card.rock{background:linear-gradient(160deg,#7a5520,#3d2a0c);border-color:rgba(200,117,51,0.5);
  box-shadow:0 8px 28px rgba(155,107,28,0.25)}
.play-card.paper{background:linear-gradient(160deg,#a09078,#4a4238);border-color:rgba(176,168,144,0.4);
  box-shadow:0 8px 28px rgba(140,120,80,0.2)}
.play-card.scissors{background:linear-gradient(160deg,#4070a0,#1a3040);border-color:rgba(80,144,184,0.4);
  box-shadow:0 8px 28px rgba(60,110,160,0.2)}

/* Desktop Hover */
@media(hover:hover){
  .play-card:not(.chosen):not(.disabled):hover{transform:translateY(-12px) scale(1.03)}
  .play-card.rock:hover{box-shadow:0 14px 40px rgba(240,160,48,0.35);border-color:var(--card-rock-glow)}
  .play-card.paper:hover{box-shadow:0 14px 40px rgba(255,233,176,0.3);border-color:var(--card-paper-glow)}
  .play-card.scissors:hover{box-shadow:0 14px 40px rgba(106,184,224,0.3);border-color:var(--card-scissors-glow)}
}
/* Chosen State */
.play-card.chosen{transform:translateY(-18px) scale(1.06);
  box-shadow:0 14px 48px rgba(255,213,79,0.3);border-color:var(--accent)}
/* Disabled State */
.play-card.disabled{opacity:0.25;cursor:not-allowed;pointer-events:none;filter:grayscale(0.5)}

/* Confirm Button Area */
#play-btn-area{height:52px;display:flex;align-items:center;justify-content:center}
#play-btn-area .btn-confirm{animation:btnAppear 0.3s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes btnAppear{0%{opacity:0;transform:scale(0.7) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}

/* ==================== Match Over Overlay ==================== */
#match-over-overlay{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(4,4,14,0.94);backdrop-filter:blur(20px)}
#match-over-overlay.show{display:flex}
.result-icon{font-size:88px;margin-bottom:12px;animation:resultIconBounce 0.8s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes resultIconBounce{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0);opacity:1}}
.result-title{font-size:36px;font-weight:900;margin-bottom:8px;letter-spacing:2px}
.result-score{font-size:20px;color:var(--text-dim);margin-bottom:40px;font-variant-numeric:tabular-nums}
#match-over-overlay.win .result-title{color:var(--win);text-shadow:0 0 30px var(--win-glow)}
#match-over-overlay.lose .result-title{color:var(--lose);text-shadow:0 0 30px var(--lose-glow)}

/* ==================== Confetti ==================== */
.confetti{position:fixed;inset:0;pointer-events:none;z-index:250;overflow:hidden}
.confetti-piece{position:absolute;top:0;opacity:0;animation:confettiFall linear forwards}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}
  80%{opacity:1}
  100%{transform:translateY(100vh) rotate(720deg) scale(0.3);opacity:0}
}

/* ==================== Responsive ==================== */
@media(max-width:640px){
  .menu-title{font-size:32px}
  .menu-subtitle{font-size:13px;letter-spacing:4px;margin-bottom:32px}
  .game-arena{gap:8px;padding:4px 10px}
  .player-panel{max-width:120px;gap:6px}
  .player-name{font-size:13px}
  .card-display{width:88px;height:126px;border-radius:12px}
  .card-display .card-icon{font-size:36px}
  .card-display .card-label{font-size:10px}
  .card-hand-area{gap:8px;padding:4px 10px 14px}
  .card-hand{gap:14px}
  .play-card{width:92px;height:128px;border-radius:14px}
  .play-card .card-icon{font-size:34px}
  .play-card .card-label{font-size:11px}
  .play-card .card-key{display:none}
  .vs-zone{min-width:56px}
  .vs-text{font-size:22px}
  .round-result{font-size:15px;padding:5px 14px}
  .game-topbar{padding:8px 12px}
  .score-badge{font-size:12px;padding:5px 12px}
  .timer-circle{width:40px;height:40px}
  .timer-circle .timer-text{font-size:12px}
  #countdown-number{font-size:90px}
  .btn-confirm{padding:10px 36px;font-size:15px;min-width:140px}
  .result-title{font-size:28px}
  .result-icon{font-size:68px}
}
@media(max-width:360px){
  .play-card{width:80px;height:112px;gap:4px}
  .play-card .card-icon{font-size:28px}
  .play-card .card-label{font-size:10px}
  .card-hand{gap:10px}
  .card-display{width:72px;height:104px}
  .card-display .card-icon{font-size:28px}
}

/* ==================== Ambient Glow ==================== */
.ambient-glow{position:fixed;width:300px;height:300px;border-radius:50%;filter:blur(100px);opacity:0.07;pointer-events:none;z-index:0;animation:ambientDrift 20s ease-in-out infinite}
.ambient-glow.glow1{background:#ffd54f;top:-100px;left:-100px}
.ambient-glow.glow2{background:#6a5acd;bottom:-100px;right:-100px;animation-delay:-10s;animation-direction:reverse}
@keyframes ambientDrift{0%,100%{transform:translate(0,0)}25%{transform:translate(40px,30px)}50%{transform:translate(-20px,60px)}75%{transform:translate(30px,-20px)}}
</style>
</head>
<body>

<!-- Ambient background glows -->
<div class="ambient-glow glow1"></div>
<div class="ambient-glow glow2"></div>

<canvas id="particles-canvas"></canvas>

        <div class="score-badge">
          <span class="me" id="score-me">0</span> : <span class="opp" id="score-opp">0</span>

          <svg viewBox="0 0 48 48">
            <circle class="bg" cx="24" cy="24" r="20"/>

          <span class="timer-text" id="timer-text">30</span>

    </div>

    <div class="game-arena">
      <!-- My Panel -->

        <div class="vs-text">VS</div>

          <div class="card-icon">📄</div>
          <div class="card-label">布</div>
        </div>
        <div class="play-card scissors" onclick="chooseCard('scissors')">
          <span class="card-key">3</span>

    <div class="result-icon" id="final-icon"></div>
    <div class="result-title" id="final-title"></div>
    <div class="result-score" id="final-score"></div>
    <button class="btn btn-play-again" onclick="restartMatch()">🔄 再来一局</button>
  </div>
</div>

<script>
/* ================================================================
   石头剪刀布 · 卡牌对战 — 前端逻辑
   ================================================================ */

// ==================== Constants ====================
const WIN_SCORE = 5, ROUND_TIME = 30;
const CIRCUMFERENCE = 2 * Math.PI * 20;
const CARD_EMOJI = { rock:'🪨', paper:'📄', scissors:'✂️', timeout:'⏰' };
const CARD_NAME  = { rock:'石头', paper:'布', scissors:'剪刀', timeout:'超时' };
const RESULT_TEXT = { win:'你赢了!', lose:'你输了', draw:'平局' };
const CARD_KEY_MAP = { '1':'rock', '2':'paper', '3':'scissors' };

// ==================== State ====================
let ws = null, connected = false, gameState = 'idle', roomCode = '', iAmHost = false;
let myCard = null, chosenCard = null, myScore = 0, oppScore = 0;
let timerInterval = null, timeLeft = ROUND_TIME;

// ==================== DOM References ====================
const $ = id => document.getElementById(id);
const menuScreen = $('menu-screen'), waitingScreen = $('waiting-screen'), gameScreen = $('game-screen');
const countdownOverlay = $('countdown-overlay'), countdownNum = $('countdown-number'), countdownLabel = $('countdown-label');
const matchOverlay = $('match-over-overlay');
const roundResultEl = $('round-result'), timerTextEl = $('timer-text'), timerProgress = $('timer-progress');
const cardHandEl = $('card-hand'), myCardDisplay = $('my-card-display'), oppCardDisplay = $('opp-card-display');
const myCardStatus = $('my-card-status'), oppCardStatus = $('opp-card-status');
const myScoreFill = $('my-score-fill'), oppScoreFill = $('opp-score-fill');
const myScoreLabel = $('my-score-label'), oppScoreLabel = $('opp-score-label');
const scoreMeBadge = $('score-me'), scoreOppBadge = $('score-opp');
const menuStatus = $('menu-status'), finalIcon = $('final-icon'), finalTitle = $('final-title'), finalScore = $('final-score');
const playBtnArea = $('play-btn-area');
const playCards = document.querySelectorAll('.play-card');
const roomInput = $('room-input');

// ==================== Audio System (Web Audio API) ====================
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, type, volume, detune) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (detune) osc.detune.setValueAtTime(detune, ctx.currentTime);
    gain.gain.setValueAtTime(volume || 0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
  } catch(e) { /* audio not available */ }
}
function playSound(type) {
  try {
    switch(type) {
      case 'select':
        playTone(600, 0.08, 'sine', 0.12);
        break;
      case 'confirm':
        playTone(800, 0.1, 'sine', 0.15);
        setTimeout(() => playTone(1200, 0.12, 'sine', 0.12), 60);
        break;
      case 'tick':
        playTone(400, 0.05, 'square', 0.06);
        break;
      case 'win':
        playTone(523, 0.15, 'sine', 0.15);
        setTimeout(() => playTone(659, 0.15, 'sine', 0.15), 120);
        setTimeout(() => playTone(784, 0.25, 'sine', 0.18), 240);
        break;
      case 'lose':
        playTone(400, 0.2, 'sine', 0.12);
        setTimeout(() => playTone(300, 0.3, 'sine', 0.1), 150);
        break;
      case 'draw':
        playTone(440, 0.15, 'triangle', 0.1);
        break;
      case 'countdown':
        playTone(500, 0.12, 'sine', 0.1);
        break;
      case 'go':
        playTone(700, 0.15, 'sine', 0.15);
        setTimeout(() => playTone(900, 0.2, 'sine', 0.15), 80);
        break;
      case 'opponent':
        playTone(550, 0.1, 'sine', 0.08);
        setTimeout(() => playTone(550, 0.1, 'sine', 0.08), 120);
        break;
      case 'victory':
        [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.3, 'sine', 0.15), i * 150));
        break;
    }
  } catch(e) {}
}

// ==================== Toast System ====================
function showToast(message, type, duration) {
  type = type || 'warning';
  duration = duration || 3000;
  const container = $('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.add('out');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

// ==================== Particle Background ====================
const particleCanvas = $('particles-canvas');
const pCtx = particleCanvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 50;

function initParticles() {
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
  particles = [];
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push({
      x: Math.random() * particleCanvas.width,
      y: Math.random() * particleCanvas.height,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 2 + 0.5,
      alpha: Math.random() * 0.3 + 0.05,
      color: ['255,213,79','106,90,205','76,175,132','106,184,224'][Math.floor(Math.random()*4)]
    });
  }
}

function animateParticles() {
  pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = particleCanvas.width;
    if (p.x > particleCanvas.width) p.x = 0;
    if (p.y < 0) p.y = particleCanvas.height;
    if (p.y > particleCanvas.height) p.y = 0;
    pCtx.beginPath();
    pCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    pCtx.fillStyle = 'rgba(' + p.color + ',' + p.alpha + ')';
    pCtx.fill();
  });
  // Draw subtle connections
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        pCtx.beginPath();
        pCtx.moveTo(particles[i].x, particles[i].y);
        pCtx.lineTo(particles[j].x, particles[j].y);
        pCtx.strokeStyle = 'rgba(255,255,255,' + (0.03 * (1 - dist / 120)) + ')';
        pCtx.lineWidth = 0.5;
        pCtx.stroke();
      }
    }
  }
  requestAnimationFrame(animateParticles);
}

window.addEventListener('resize', () => {
  particleCanvas.width = window.innerWidth;
  particleCanvas.height = window.innerHeight;
});

// Check reduced motion preference
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
if (!prefersReducedMotion) {
  initParticles();
  animateParticles();
}

// ==================== WebSocket ====================
function connect() {
  if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) return;
  const p = location.protocol === 'https:' ? 'wss:' : 'ws:';
  menuStatus.textContent = '正在连接服务器...';
  ws = new WebSocket(p + '//' + location.host);
  ws.onopen = () => { connected = true; menuStatus.textContent = '✅ 已连接'; };
  ws.onmessage = e => { try { handleMessage(JSON.parse(e.data)); } catch(err) { console.error(err); } };
  ws.onclose = () => {
    connected = false; ws = null;
    if (gameState === 'playing' || gameState === 'round_result') showToast('连接断开，请刷新重试', 'error', 5000);
    showScreen('menu'); menuStatus.textContent = '❌ 连接断开，请刷新页面';
  };
  ws.onerror = () => { menuStatus.textContent = '❌ 连接失败'; };
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

// ==================== Message Handler ====================
function handleMessage(msg) {
  switch (msg.type) {
    case 'room_created':
      roomCode = msg.code; iAmHost = true; gameState = 'waiting';
      $('room-code-text').textContent = roomCode;
      $('room-created').classList.add('visible');
      $('waiting-code-text').textContent = roomCode;
      $('waiting-room-code').style.display = '';
      $('waiting-title').textContent = '等待对手加入...';
      showScreen('waiting');
      playSound('confirm');
      break;

    case 'opponent_joined':
      $('waiting-title').textContent = '对手已加入!';
      playSound('opponent');
      break;

    case 'room_joined':
      roomCode = msg.code; iAmHost = false; gameState = 'waiting';
      $('waiting-title').textContent = '已加入房间!';
      $('waiting-room-code').style.display = 'none';
      showScreen('waiting');
      playSound('confirm');
      break;

    case 'room_error':
      showToast(msg.message, 'error', 3000);
      menuStatus.textContent = '加入失败: ' + msg.message;
      playSound('lose');
      break;

    case 'room_left':
      showScreen('menu'); menuStatus.textContent = '已取消';
      break;

    case 'game_countdown':
      showCountdown(msg.seconds);
      playSound(msg.seconds === 0 ? 'go' : 'countdown');
      if (msg.seconds === 0) setTimeout(() => { countdownOverlay.classList.remove('show','go'); showScreen('game'); }, 700);
      break;

    case 'round_start':
      gameState = 'playing'; myCard = null; chosenCard = null;
      timeLeft = msg.timeLeft; myScore = msg.myScore; oppScore = msg.oppScore;
      resetCards(); startTimer(msg.timeLeft);
      updateScoreBadge(msg.myScore, msg.oppScore);
      updateScoreBars(msg.myScore, msg.oppScore);
      break;

    case 'opponent_played':
      oppCardStatus.textContent = '已出牌 ✓'; oppCardStatus.className = 'card-status played';
      oppCardDisplay.className = 'card-display hidden';
      oppCardDisplay.innerHTML = '<div class="card-icon" style="font-size:40px">❓</div><div class="card-label">已准备</div>';
      playSound('opponent');
      break;

    case 'card_played':
      myCard = msg.card;
      myCardStatus.textContent = '已出牌 ✓'; myCardStatus.className = 'card-status played';
      playCards.forEach(c => { c.classList.remove('chosen'); c.classList.add('disabled'); });
      playBtnArea.innerHTML = '';
      myCardDisplay.className = 'card-display ' + msg.card;
      myCardDisplay.innerHTML = '<div class="card-icon">' + CARD_EMOJI[msg.card] + '</div><div class="card-label">' + CARD_NAME[msg.card] + '</div>';
      playSound('confirm');
      break;

    case 'round_result':
      gameState = 'round_result'; myScore = msg.myScore; oppScore = msg.oppScore; stopTimer();
      // Reveal opponent card with animation
      oppCardDisplay.className = 'card-display ' + msg.oppCard + ' reveal';
      oppCardDisplay.innerHTML = '<div class="card-icon">' + CARD_EMOJI[msg.oppCard] + '</div><div class="card-label">' + CARD_NAME[msg.oppCard] + '</div>';
      oppCardStatus.textContent = ''; oppCardStatus.className = 'card-status';
      if (!myCard) {
        myCardDisplay.className = 'card-display ' + msg.myCard + ' reveal';
        myCardDisplay.innerHTML = '<div class="card-icon">' + CARD_EMOJI[msg.myCard] + '</div><div class="card-label">' + CARD_NAME[msg.myCard] + '</div>';
      }
      myCardStatus.textContent = ''; myCardStatus.className = 'card-status';
      // Win glow on my card
      if (msg.result === 'win') {
        myCardDisplay.classList.add('win-glow');
      } else if (msg.result === 'lose') {
        oppCardDisplay.classList.add('win-glow');
      }
      updateScoreBars(msg.myScore, msg.oppScore);
      updateScoreBadge(msg.myScore, msg.oppScore);
      showRoundResult(msg.result);
      playSound(msg.result);
      break;

    case 'match_over':
      gameState = 'match_over'; stopTimer();
      myScore = msg.myScore; oppScore = msg.oppScore;
      updateScoreBars(msg.myScore, msg.oppScore);
      showMatchOver(myScore > oppScore);
      break;

    case 'opponent_disconnected':
      showToast('对手断开了连接', 'error', 4000);
      resetGame(); showScreen('menu');
      break;

    case 'pong': break;
  }
}

// ==================== UI Functions ====================
function showScreen(n) {
  [menuScreen, waitingScreen, gameScreen].forEach(s => s.classList.remove('active'));
  matchOverlay.classList.remove('show');
  if (n === 'menu') menuScreen.classList.add('active');
  else if (n === 'waiting') waitingScreen.classList.add('active');
  else if (n === 'game') gameScreen.classList.add('active');
}

function showCountdown(s) {
  countdownOverlay.classList.add('show');
  countdownOverlay.classList.toggle('go', s === 0);
  countdownNum.textContent = s === 0 ? 'GO!' : s;
  countdownLabel.textContent = s === 0 ? '' : s === 1 ? '准备好了吗...' : '';
  countdownNum.classList.remove('count-pop','count-go');
  void countdownNum.offsetWidth; // reflow
  countdownNum.classList.add(s === 0 ? 'count-go' : 'count-pop');
}

// ==================== Card Selection ====================
function chooseCard(card) {
  if (gameState !== 'playing' || myCard) return;

  if (chosenCard === card) {
    chosenCard = null;
    playCards.forEach(c => c.classList.remove('chosen'));
    playBtnArea.innerHTML = '';
    return;
  }

  chosenCard = card;
  playCards.forEach(c => {
    c.classList.remove('chosen');
    if (c.classList.contains(card)) c.classList.add('chosen');
  });
  playBtnArea.innerHTML = '<button class="btn btn-confirm" onclick="confirmPlay()">⚔ 出牌</button>';
  playSound('select');
}

function confirmPlay() {
  if (!chosenCard || myCard) return;
  send({ type: 'play', card: chosenCard });
  playCards.forEach(c => c.classList.remove('chosen'));
  playBtnArea.innerHTML = '';
}

// ==================== Reset ====================
function resetCards() {
  myCardDisplay.className = 'card-display placeholder';
  myCardDisplay.innerHTML = '<span>请出牌</span>';
  oppCardDisplay.className = 'card-display placeholder';
  oppCardDisplay.innerHTML = '<span>等待中</span>';
  myCardStatus.textContent = ''; myCardStatus.className = 'card-status';
  oppCardStatus.textContent = ''; oppCardStatus.className = 'card-status';
  chosenCard = null;
  playCards.forEach(c => { c.classList.remove('chosen', 'disabled'); });
  playBtnArea.innerHTML = '';
  roundResultEl.className = 'round-result'; roundResultEl.textContent = '';
}

// ==================== Score Display ====================
function updateScoreBars(m, o) {
  myScoreFill.style.width = Math.round((m / WIN_SCORE) * 100) + '%';
  oppScoreFill.style.width = Math.round((o / WIN_SCORE) * 100) + '%';
  myScoreLabel.textContent = m + ' / ' + WIN_SCORE;
  oppScoreLabel.textContent = o + ' / ' + WIN_SCORE;
}

function updateScoreBadge(m, o) { scoreMeBadge.textContent = m; scoreOppBadge.textContent = o; }

// ==================== Result Display ====================
function showRoundResult(r) {
  roundResultEl.textContent = RESULT_TEXT[r];
  roundResultEl.className = 'round-result';
  void roundResultEl.offsetWidth;
  roundResultEl.classList.add(r, 'show');
}

function showMatchOver(won) {
  matchOverlay.className = 'show ' + (won ? 'win' : 'lose');
  finalIcon.textContent = won ? '🏆' : '💔';
  finalTitle.textContent = won ? '恭喜获胜!' : '惜败';
  finalScore.textContent = '最终比分  ' + myScore + ' : ' + oppScore;
  if (won) {
    spawnConfetti();
    playSound('victory');
  } else {
    playSound('lose');
  }
}

// ==================== Timer ====================
function startTimer(t) {
  stopTimer(); timeLeft = t; updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 10 && timeLeft > 0) playSound('tick');
    if (timeLeft <= 0) stopTimer();
  }, 1000);
}

function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

function updateTimerDisplay() {
  const pct = timeLeft / ROUND_TIME;
  timerProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
  timerTextEl.textContent = timeLeft;
  const u = timeLeft <= 10;
  timerProgress.classList.toggle('urgent', u);
  timerTextEl.classList.toggle('urgent', u);
}

// ==================== Room Actions ====================
function createRoom() { if (!connected) connect(); send({ type: 'create_room' }); }

function joinRoom() {
  const code = roomInput.value.trim().toUpperCase();
  if (!code || code.length < 4) { showToast('请输入有效的房间号', 'warning'); return; }
  if (!connected) connect();
  send({ type: 'join_room', code });
}

function leaveRoom() { send({ type: 'leave_room' }); showScreen('menu'); }

function copyRoomCode() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(roomCode)
      .then(() => showToast('已复制房间号!', 'success'))
      .catch(() => showToast('请手动复制: ' + roomCode, 'warning'));
  } else {
    // Fallback for non-secure contexts
    const ta = document.createElement('textarea');
    ta.value = roomCode;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('已复制房间号!', 'success');
  }
}

function restartMatch() { matchOverlay.classList.remove('show'); resetCards(); resetGame(); showScreen('menu'); }

function resetGame() {
  myScore = 0; oppScore = 0; myCard = null; chosenCard = null; gameState = 'idle'; stopTimer();
  playCards.forEach(c => { c.classList.remove('chosen', 'disabled'); });
  playBtnArea.innerHTML = '';
  updateScoreBars(0, 0);
  scoreMeBadge.textContent = '0'; scoreOppBadge.textContent = '0';
  roundResultEl.className = 'round-result'; roundResultEl.textContent = '';
  matchOverlay.classList.remove('show');
  $('room-created').classList.remove('visible');
}

// ==================== Confetti ====================
function spawnConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti';
  document.body.appendChild(container);

  const colors = ['#ffd54f','#ff6b6b','#4ecdc4','#836fff','#ff8c00','#6ab8e0','#4caf84','#ff4081','#ffffff'];

  for (let i = 0; i < 100; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = 5 + Math.random() * 10;
    const left = Math.random() * 100;
    const duration = 2.5 + Math.random() * 3;
    const delay = Math.random() * 2;
    const drift = (Math.random() - 0.5) * 200;
    const rotation = Math.random() * 720;

    piece.style.cssText =
      'left:' + left + '%;' +
      'width:' + size + 'px;' +
      'height:' + size + 'px;' +
      'background:' + color + ';' +
      'border-radius:' + (Math.random() > 0.4 ? '50%' : '2px') + ';' +
      'animation-duration:' + duration + 's;' +
      'animation-delay:' + delay + 's;';

    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 6000);
}

// ==================== Keyboard Shortcuts ====================
document.addEventListener('keydown', e => {
  // Number keys for card selection
  if (CARD_KEY_MAP[e.key]) {
    e.preventDefault();
    chooseCard(CARD_KEY_MAP[e.key]);
    return;
  }
  // Enter to confirm
  if (e.key === 'Enter') {
    e.preventDefault();
    if (chosenCard) confirmPlay();
    else if (gameState === 'idle' || gameState === 'waiting') {
      if (gameState === 'idle') createRoom();
    }
    return;
  }
  // Escape to go back
  if (e.key === 'Escape') {
    e.preventDefault();
    if (gameState === 'waiting') leaveRoom();
    else if (gameState === 'match_over') restartMatch();
    return;
  }
});

// ==================== Heartbeat & Init ====================
setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN) send({ type: 'ping' });
}, 30000);

// Initialize
showScreen('menu');
connect();
</script>
